<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Home Pane</title>
    <link rel="stylesheet" href="../css/home.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="screen">
      <h1>
        HELP IS <br />
        ON THEIR WAY
      </h1>
      <p class="sub">Speak calmly. Tell us what happened</p>

      <div class="sos-container">
        <div class="sos-button" id="sosBtn">SOS</div>
        <p class="hint">Hold for 3 seconds to call responders</p>
      </div>

      <div class="cards">
        <div class="card" onclick="triggerEmergency('injury')">
          <i class="fa-solid fa-user-injured"></i>
          <p>I am <b>INJURED</b></p>
        </div>
        <div class="card" onclick="triggerEmergency('fire')">
          <i class="fa-solid fa-fire"></i>
          <p>There's a <b>FIRE</b></p>
        </div>
        <div class="card" onclick="triggerEmergency('crime')">
          <i class="fa-solid fa-shield-halved"></i>
          <p>There's a <b>CRIME</b></p>
        </div>
        <div class="card" onclick="triggerEmergency('accident')">
          <i class="fa-solid fa-car-crash"></i>
          <p>There's a <b>ACCIDENT</b></p>
        </div>
      </div>
    </div>

    <script>
      let timer = null;
      let holdStarted = false;
      let elapsed = 0;
      let holdDuration = 3000;
      const sosBtn = document.getElementById("sosBtn");
      const holdHint = document.querySelector(".hint");

      function applyTheme(theme) {
        const isDark =
          theme === "dark" ||
          (theme === "auto" &&
            window.matchMedia?.("(prefers-color-scheme: dark)")?.matches);
        document.documentElement.classList.toggle("theme-dark", isDark);
        document.body.classList.toggle("theme-dark", isDark);
      }

      function applyLanguage(language) {
        const title = document.querySelector("h1");
        const sub = document.querySelector(".sub");

        if (language === "tl") {
          title.innerHTML = "PAPARATING <br /> NA ANG TULONG";
          sub.textContent = "Magsalita nang mahinahon. Sabihin ang nangyari";
        } else {
          title.innerHTML = "HELP IS <br /> ON THEIR WAY";
          sub.textContent = "Speak calmly. Tell us what happened";
        }
      }

      function applyVisualSettings() {
        applyTheme(localStorage.getItem("theme") || "light");
        applyLanguage(localStorage.getItem("language") || "en");
      }

      applyVisualSettings();

      const progress = document.createElement("p");
      progress.className = "hint";
      progress.style.display = "none";
      progress.style.color = "#a83232";
      progress.style.marginTop = "10px";
      sosBtn.parentElement.appendChild(progress);

      function getHoldTimeMs() {
        const saved = Number(localStorage.getItem("holdTime") || 3);
        const normalized = [2, 3, 5].includes(saved) ? saved : 3;
        return normalized * 1000;
      }

      function applyHoldTimeSetting() {
        holdDuration = getHoldTimeMs();
        const seconds = holdDuration / 1000;
        if (holdHint) {
          holdHint.textContent = `Hold for ${seconds} seconds to call responders`;
        }
      }

      applyHoldTimeSetting();

      function startSOSTimer() {
        if (holdStarted) {
          return;
        }

        holdStarted = true;
        elapsed = 0;
        progress.style.display = "block";
        sosBtn.classList.add("holding");

        timer = window.setInterval(() => {
          elapsed += 100;
          progress.textContent = `${Math.floor(elapsed / 1000)}.${Math.floor((elapsed % 1000) / 100)}s`;

          if (elapsed >= holdDuration) {
            resetSOSTimer();
            if (window.parent?.appShell?.triggerSOS) {
              window.parent.appShell.triggerSOS();
            }
          }
        }, 100);
      }

      function resetSOSTimer() {
        if (timer) {
          window.clearInterval(timer);
          timer = null;
        }

        holdStarted = false;
        sosBtn.classList.remove("holding");
        progress.style.display = "none";
        progress.textContent = "";
      }

      sosBtn.addEventListener("mousedown", startSOSTimer);
      sosBtn.addEventListener("mouseup", resetSOSTimer);
      sosBtn.addEventListener("mouseleave", resetSOSTimer);
      sosBtn.addEventListener("touchstart", (event) => {
        event.preventDefault();
        startSOSTimer();
      });
      sosBtn.addEventListener("touchend", (event) => {
        event.preventDefault();
        resetSOSTimer();
      });
      sosBtn.addEventListener("touchcancel", resetSOSTimer);

      window.addEventListener("storage", (event) => {
        if (event.key === "holdTime") {
          applyHoldTimeSetting();
        }
      });

      window.addEventListener("message", (event) => {
        if (event.data?.type !== "setting-changed") {
          return;
        }

        if (event.data?.key === "holdTime") {
          applyHoldTimeSetting();
        }

        if (event.data?.key === "theme" || event.data?.key === "language") {
          applyVisualSettings();
        }
      });

      window.addEventListener("storage", (event) => {
        if (event.key === "theme" || event.key === "language") {
          applyVisualSettings();
        }
      });

      function triggerEmergency(type) {
        if (window.parent?.appShell?.triggerEmergency) {
          window.parent.appShell.triggerEmergency(type);
        }
      }
    </script>
  </body>
</html>
