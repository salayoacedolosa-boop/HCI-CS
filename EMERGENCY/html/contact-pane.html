<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacts Content</title>
    <link rel="stylesheet" href="../css/contact.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="screen">
      <h1>EMERGENCY <br />CONTACTS</h1>
      <p class="sub">Official hotlines and personal contacts</p>

      <div class="add-contact-section">
        <button class="add-contact-btn" id="addContactBtn">
          <i class="fa-solid fa-plus"></i>
          <span>Add Emergency Contact</span>
        </button>
      </div>

      <div class="contacts-content">
        <div class="contacts-section">
          <h3 class="section-title">
            <i class="fa-solid fa-building"></i
            ><span class="section-label">Official Emergency Hotlines</span>
          </h3>
          <div class="contact-list" id="officialContacts">
            <div class="contact-state">Loading hotlines...</div>
          </div>
        </div>

        <div class="contacts-section" id="personalSection">
          <h3 class="section-title">
            <i class="fa-solid fa-user-friends"></i
            ><span class="section-label">Personal Emergency Contacts</span>
          </h3>
          <div class="contact-list" id="personalContacts">
            <div class="contact-state">Sign in to view your contacts.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Add Contact Modal -->
    <div class="modal" id="addContactModal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Add Emergency Contact</h3>
          <button class="close-btn" id="closeModalBtn" aria-label="Close modal">
            <i class="fa-solid fa-times"></i>
          </button>
        </div>
        <form class="contact-form" id="addContactForm">
          <div class="form-group">
            <label for="contactName">Name</label>
            <input type="text" id="contactName" required />
          </div>
          <div class="form-group">
            <label for="contactPhone">Phone Number</label>
            <input type="tel" id="contactPhone" required />
          </div>
          <div class="form-group">
            <label for="contactRelation">Relationship</label>
            <select id="contactRelation">
              <option value="Family">Family</option>
              <option value="Friend">Friend</option>
              <option value="Neighbor">Neighbor</option>
              <option value="Doctor">Doctor</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <button type="submit" class="submit-btn" id="submitBtn">
            Add Contact
          </button>
        </form>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "firebase/app";
      import { getAuth, onAuthStateChanged } from "firebase/auth";
      import {
        addDoc,
        collection,
        deleteDoc,
        doc,
        getDocs,
        getFirestore,
        orderBy,
        query,
        serverTimestamp,
      } from "firebase/firestore";
      import { getPrimaryEmergencyHotline } from "../api/hotlines.js";

      // ── Firebase init ────────────────────────────────────────────────────────
      const firebaseConfig = {
        apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
        authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
        projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
        storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
        messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
        appId: import.meta.env.VITE_FIREBASE_APP_ID,
      };

      const missingKeys = Object.entries(firebaseConfig)
        .filter(([, v]) => !v)
        .map(([k]) => k);

      let db = null;
      let auth = null;
      let currentUser = null;

      if (missingKeys.length === 0) {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
      } else {
        console.error("Missing Firebase config:", missingKeys.join(", "));
      }

      // ── DOM refs ─────────────────────────────────────────────────────────────
      const officialList = document.getElementById("officialContacts");
      const personalList = document.getElementById("personalContacts");
      const addContactBtn = document.getElementById("addContactBtn");
      const addContactModal = document.getElementById("addContactModal");
      const closeModalBtn = document.getElementById("closeModalBtn");
      const addContactForm = document.getElementById("addContactForm");
      const submitBtn = document.getElementById("submitBtn");
      const LOCAL_CONTACTS_KEY = "emergency_personal_contacts";

      let contactStorageMode = "firestore";

      function applyTheme(theme) {
        const isDark =
          theme === "dark" ||
          (theme === "auto" &&
            window.matchMedia?.("(prefers-color-scheme: dark)")?.matches);
        document.documentElement.classList.toggle("theme-dark", isDark);
        document.body.classList.toggle("theme-dark", isDark);
      }

      function applyLanguage(language) {
        const title = document.querySelector("h1");
        const sub = document.querySelector(".sub");
        const addBtnLabel = addContactBtn?.querySelector("span");
        const modalTitle = document.querySelector(
          "#addContactModal .modal-header h3",
        );
        const submitButton = document.getElementById("submitBtn");
        const sectionLabels = document.querySelectorAll(".section-label");
        if (language === "tl") {
          title.innerHTML = "MGA EMERGENCY <br /> CONTACT";
          sub.textContent = "Opisyal na hotlines at personal na contacts";
          if (addBtnLabel) {
            addBtnLabel.textContent = "Magdagdag ng Emergency Contact";
          }
          if (sectionLabels[0]) {
            sectionLabels[0].textContent = "Official Emergency Hotlines";
          }
          if (sectionLabels[1]) {
            sectionLabels[1].textContent = "Personal Emergency Contacts";
          }
          if (modalTitle) {
            modalTitle.textContent = "Magdagdag ng Emergency Contact";
          }
          if (submitButton) {
            submitButton.textContent = "I-save ang Contact";
          }
        } else {
          title.innerHTML = "EMERGENCY <br /> CONTACTS";
          sub.textContent = "Official hotlines and personal contacts";
          if (addBtnLabel) {
            addBtnLabel.textContent = "Add Emergency Contact";
          }
          if (sectionLabels[0]) {
            sectionLabels[0].textContent = "Official Emergency Hotlines";
          }
          if (sectionLabels[1]) {
            sectionLabels[1].textContent = "Personal Emergency Contacts";
          }
          if (modalTitle) {
            modalTitle.textContent = "Add Emergency Contact";
          }
          if (submitButton) {
            submitButton.textContent = "Add Contact";
          }
        }
      }

      function applyVisualSettings() {
        applyTheme(localStorage.getItem("theme") || "light");
        applyLanguage(localStorage.getItem("language") || "en");
      }

      applyVisualSettings();

      // ── Helpers ──────────────────────────────────────────────────────────────
      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function dialNumber(number) {
        window.location.href = `tel:${encodeURIComponent(number)}`;
      }

      function makeCallButton(number) {
        const btn = document.createElement("button");
        btn.className = "call-btn";
        btn.type = "button";
        btn.setAttribute("aria-label", `Call ${number}`);
        btn.innerHTML = `<i class="fa-solid fa-phone"></i>`;
        btn.addEventListener("click", () => dialNumber(number));
        return btn;
      }

      function makeDeleteButton(onConfirm) {
        const btn = document.createElement("button");
        btn.className = "delete-btn";
        btn.type = "button";
        btn.setAttribute("aria-label", "Delete contact");
        btn.innerHTML = `<i class="fa-solid fa-trash"></i>`;
        btn.addEventListener("click", onConfirm);
        return btn;
      }

      function isPermissionDeniedError(error) {
        if (!error) {
          return false;
        }

        return (
          error.code === "permission-denied" ||
          String(error.message || "")
            .toLowerCase()
            .includes("permission-denied") ||
          String(error.message || "")
            .toLowerCase()
            .includes("missing or insufficient permissions")
        );
      }

      function readLocalContacts() {
        try {
          const raw = localStorage.getItem(LOCAL_CONTACTS_KEY);
          const parsed = JSON.parse(raw || "[]");
          if (!Array.isArray(parsed)) {
            return [];
          }
          return parsed;
        } catch (error) {
          console.warn("Failed to read local contacts:", error);
          return [];
        }
      }

      function writeLocalContacts(contacts) {
        localStorage.setItem(LOCAL_CONTACTS_KEY, JSON.stringify(contacts));
      }

      // ── Official hotlines ────────────────────────────────────────────────────
      const FALLBACK_HOTLINES = [
        {
          name: "PLP Clinic",
          phoneNumber: "(02) 8642-1234",
          service: "Medical Services",
          icon: "fa-clinic-medical",
        },
        {
          name: "PLP Response Team",
          phoneNumber: "09162598683",
          service: "Emergency Response",
          icon: "fa-shield-alt",
        },
      ];

      function renderOfficialHotlines(hotlines) {
        officialList.innerHTML = "";
        hotlines.forEach((h) => {
          const item = document.createElement("div");
          item.className = "contact-item official";

          const icon = h.icon || "fa-phone";
          item.innerHTML = `
            <div class="contact-icon"><i class="fa-solid ${escapeHtml(icon)}"></i></div>
            <div class="contact-info">
              <div class="contact-name">${escapeHtml(h.name)}</div>
              <div class="contact-number">${escapeHtml(h.phoneNumber)}</div>
              <div class="contact-location">${escapeHtml(h.service || "")}</div>
            </div>
          `;
          item.appendChild(makeCallButton(h.phoneNumber));
          officialList.appendChild(item);
        });
      }

      async function loadOfficialHotlines() {
        // Try loading all active hotlines from Firestore
        let hotlines = [];

        if (db) {
          try {
            const snap = await getDocs(
              query(collection(db, "emergency_hotlines")),
            );
            snap.forEach((d) => {
              const data = d.data();
              if (data.isActive !== false) {
                hotlines.push(data);
              }
            });
          } catch (error) {
            console.warn(
              "Could not load official hotlines from Firestore:",
              error,
            );
          }
        }

        // If Firestore had nothing, try the primary hotline helper
        if (hotlines.length === 0 && db) {
          const result = await getPrimaryEmergencyHotline(db);
          if (result.success && result.hotline) {
            hotlines = [result.hotline];
          }
        }

        // Final fallback: hardcoded PLP contacts
        if (hotlines.length === 0) {
          hotlines = FALLBACK_HOTLINES;
        }

        renderOfficialHotlines(hotlines);
      }

      // ── Personal contacts ────────────────────────────────────────────────────
      function personalContactsRef(uid) {
        return collection(db, "users", uid, "contacts");
      }

      function renderPersonalContacts(contacts, mode = "firestore") {
        personalList.innerHTML = "";

        if (contacts.length === 0) {
          const emptyMessage =
            mode === "local"
              ? "No personal contacts saved on this device yet."
              : "No personal contacts added yet.";
          personalList.innerHTML = `<div class="contact-state">${emptyMessage}</div>`;
          return;
        }

        contacts.forEach(({ id, name, phone, relation }) => {
          const item = document.createElement("div");
          item.className = "contact-item personal";

          item.innerHTML = `
            <div class="contact-icon"><i class="fa-solid fa-user"></i></div>
            <div class="contact-info">
              <div class="contact-name">${escapeHtml(name)}</div>
              <div class="contact-number">${escapeHtml(phone)}</div>
              <div class="contact-location">${escapeHtml(relation)}</div>
            </div>
          `;

          item.appendChild(makeCallButton(phone));
          item.appendChild(
            makeDeleteButton(async () => {
              if (!confirm(`Remove ${name} from your contacts?`)) return;
              try {
                if (mode === "local") {
                  const contacts = readLocalContacts().filter(
                    (contact) => contact.id !== id,
                  );
                  writeLocalContacts(contacts);
                  renderPersonalContacts(contacts, "local");
                  return;
                }

                await deleteDoc(
                  doc(db, "users", currentUser.uid, "contacts", id),
                );
                await loadPersonalContacts(currentUser.uid);
              } catch (error) {
                console.error("Failed to delete contact:", error);
                alert("Unable to delete contact. Please try again.");
              }
            }),
          );

          personalList.appendChild(item);
        });
      }

      async function loadPersonalContacts(uid) {
        personalList.innerHTML = `<div class="contact-state">Loading your contacts...</div>`;

        if (!db || !uid) {
          contactStorageMode = "local";
          renderPersonalContacts(readLocalContacts(), "local");
          return;
        }

        try {
          const q = query(
            personalContactsRef(uid),
            orderBy("createdAt", "asc"),
          );
          const snap = await getDocs(q);
          const contacts = [];
          snap.forEach((d) => contacts.push({ id: d.id, ...d.data() }));
          contactStorageMode = "firestore";
          renderPersonalContacts(contacts, "firestore");
        } catch (error) {
          console.error("Error loading personal contacts:", error);

          if (isPermissionDeniedError(error)) {
            contactStorageMode = "local";
            renderPersonalContacts(readLocalContacts(), "local");
            return;
          }

          personalList.innerHTML = `<div class="contact-state contact-state-error">Unable to load contacts right now.</div>`;
        }
      }

      // ── Add contact form ─────────────────────────────────────────────────────
      addContactBtn.addEventListener("click", () => {
        addContactForm.reset();
        addContactModal.style.display = "flex";
      });

      closeModalBtn.addEventListener("click", () => {
        addContactModal.style.display = "none";
      });

      addContactModal.addEventListener("click", (event) => {
        if (event.target === addContactModal) {
          addContactModal.style.display = "none";
        }
      });

      addContactForm.addEventListener("submit", async (event) => {
        event.preventDefault();

        const name = document.getElementById("contactName").value.trim();
        const phone = document.getElementById("contactPhone").value.trim();
        const relation = document.getElementById("contactRelation").value;

        if (!name || !phone) return;

        submitBtn.disabled = true;
        submitBtn.textContent = "Saving...";

        try {
          const canUseFirestore =
            Boolean(currentUser && db) && contactStorageMode !== "local";

          if (canUseFirestore) {
            await addDoc(personalContactsRef(currentUser.uid), {
              name,
              phone,
              relation,
              createdAt: serverTimestamp(),
            });
          } else {
            const contacts = readLocalContacts();
            contacts.push({
              id: `local_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
              name,
              phone,
              relation,
            });
            writeLocalContacts(contacts);
            contactStorageMode = "local";
          }

          addContactModal.style.display = "none";
          if (currentUser && contactStorageMode !== "local") {
            await loadPersonalContacts(currentUser.uid);
          } else {
            renderPersonalContacts(readLocalContacts(), "local");
          }
        } catch (error) {
          console.error("Failed to save contact:", error);

          if (isPermissionDeniedError(error)) {
            const contacts = readLocalContacts();
            contacts.push({
              id: `local_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
              name,
              phone,
              relation,
            });
            writeLocalContacts(contacts);
            contactStorageMode = "local";
            addContactModal.style.display = "none";
            renderPersonalContacts(contacts, "local");
            alert(
              "Saved on this device only because Firestore permissions are currently denied.",
            );
          } else {
            alert("Unable to save contact. Please try again.");
          }
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Add Contact";
        }
      });

      // ── Auth + boot ──────────────────────────────────────────────────────────
      loadOfficialHotlines();

      if (auth) {
        onAuthStateChanged(auth, (user) => {
          currentUser = user;

          if (user) {
            loadPersonalContacts(user.uid);
          } else {
            contactStorageMode = "local";
            renderPersonalContacts(readLocalContacts(), "local");
          }
        });
      } else {
        contactStorageMode = "local";
        renderPersonalContacts(readLocalContacts(), "local");
      }

      window.addEventListener("message", (event) => {
        if (event.data?.type !== "setting-changed") {
          return;
        }

        if (event.data.key === "theme" || event.data.key === "language") {
          applyVisualSettings();
        }
      });

      window.addEventListener("storage", (event) => {
        if (event.key === "theme" || event.key === "language") {
          applyVisualSettings();
        }
      });
    </script>
  </body>
</html>
