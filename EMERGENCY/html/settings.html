<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emergency Response - Settings</title>
    <meta http-equiv="refresh" content="0; url=home.html?panel=settings" />
  </head>
  <body>
    <script>
      window.location.replace("home.html?panel=settings");
    </script>
  </body>
</html>
        </div>

        <div class="setting-item clickable" onclick="clearData()">
          <div class="setting-info">
            <div class="setting-name">Clear All Data</div>
            <div class="setting-desc">Remove all saved contacts and history</div>
          </div>
          <i class="fa-solid fa-chevron-right setting-arrow"></i>
        </div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <div class="bottom-nav">
      <div data-route="home" onclick="goHome()"><i class="fa-solid fa-house"></i></div>
      <div data-route="history" onclick="goHistory()"><i class="fa-solid fa-clock-rotate-left"></i></div>
      <div data-route="contact" onclick="goContact()"><i class="fa-solid fa-address-book"></i></div>
      <div class="active" data-route="settings" onclick="goSettings()"><i class="fa-solid fa-gear"></i></div>
    </div>

  </div>
</div>

<script>
/* TOP BAR */
function goToProfile() {
  window.location.href = "profile.html";
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      console.log(pos.coords.latitude, pos.coords.longitude);
      alert("Location captured (check console)");
    },
    () => {
      alert("Unable to get location");
    }
  );
}

/* NAVIGATION */
function goHome() {
  window.location.href = "home.html";
}

function goHistory() {
  window.location.href = "history.html";
}

function goContact() {
  window.location.href = "contact.html";
}

function goSettings() {
  window.location.href = "settings.html";
}

/* SETTINGS FUNCTIONS */
function showHelp() {
  alert("Help & Support\n\nFor assistance, contact:\n- PLP IT Support: (02) 8642-9999\n- Emergency Hotline: 911\n- Email: support@plp.edu.ph");
}

function showAbout() {
  alert("PLP Emergency Response App\n\nVersion: 1.0.0\nDeveloped for Pasig Learning Partners\n© 2026 PLP Emergency Services");
}

function clearData() {
  if (confirm("Are you sure you want to clear all data? This action cannot be undone.")) {
    localStorage.removeItem('emergencyContacts');
    alert("All data has been cleared.");
  }
}

// Load saved settings
function loadSettings() {
  // Load toggle states
  const toggles = ['autoCall', 'locationShare', 'pushNotif', 'soundAlerts', 'vibration', 'locationPerm', 'dataShare', 'biometricLock'];
  toggles.forEach(id => {
    const saved = localStorage.getItem(id);
    if (saved !== null) {
      document.getElementById(id).checked = saved === 'true';
    }
  });

  // Load select values
  const selects = ['holdTime', 'bloodType', 'language', 'theme'];
  selects.forEach(id => {
    const saved = localStorage.getItem(id);
    if (saved) {
      document.getElementById(id).value = saved;
    }
  });
}

// Save settings when changed
function saveSettings() {
  // Save toggle states
  const toggles = ['autoCall', 'locationShare', 'pushNotif', 'soundAlerts', 'vibration', 'locationPerm', 'dataShare', 'biometricLock'];
  toggles.forEach(id => {
    const element = document.getElementById(id);
    element.addEventListener('change', () => {
      localStorage.setItem(id, element.checked);
    });
  });

  // Save select values
  const selects = ['holdTime', 'bloodType', 'language', 'theme'];
  selects.forEach(id => {
    const element = document.getElementById(id);
    element.addEventListener('change', () => {
      localStorage.setItem(id, element.value);
    });
  });
}

function setActiveMenu(route) {
  const items = document.querySelectorAll('.bottom-nav [data-route]');
  items.forEach(item => item.classList.toggle('active', item.dataset.route === route));
}

window.addEventListener('DOMContentLoaded', () => {
  const page = window.location.pathname.split('/').pop().split('.').shift();
  setActiveMenu(page || 'home');

  document.querySelectorAll('.bottom-nav [data-route]').forEach(item => {
    item.addEventListener('click', () => {
      setActiveMenu(item.dataset.route);
    });
  });

  // Initialize settings
  loadSettings();
  saveSettings();
});
</script>

</body>
</html>
