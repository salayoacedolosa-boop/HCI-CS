<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Emergency Response</title>

    <link rel="stylesheet" href="../css/home.css" />

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body class="app-shell">
    <div class="phone-frame">
      <div class="screen">
        <!-- TOP BAR -->
        <div class="top-bar">
          <div class="profile" onclick="goToProfile()">
            <i class="fa-solid fa-user"></i>
            <span id="userDisplay">Login using your PLP Account</span>
          </div>

          <div class="location" onclick="getLocation()">
            <span id="locationDisplay">See your Location</span>
            <i class="fa-solid fa-location-dot"></i>
          </div>
        </div>

        <!-- Guest Info Modal -->
        <div
          id="guestInfoModal"
          class="profile-modal"
          aria-hidden="true"
          style="display: none"
        >
          <div
            class="profile-modal-backdrop"
            onclick="closeGuestInfoModal()"
          ></div>
          <div
            class="profile-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="guestInfoTitle"
          >
            <div class="profile-modal-header">
              <h2 id="guestInfoTitle">Your Information</h2>
              <button
                type="button"
                class="profile-modal-close"
                onclick="closeGuestInfoModal()"
                aria-label="Close guest info"
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <form id="guestInfoForm" class="profile-form">
              <label class="profile-input-label" for="guestNameInput"
                >Name</label
              >
              <input
                id="guestNameInput"
                class="profile-input"
                type="text"
                placeholder="Enter your name"
                required
              />
              <label class="profile-input-label" for="guestPhoneInput"
                >Phone Number</label
              >
              <input
                id="guestPhoneInput"
                class="profile-input"
                type="tel"
                placeholder="Enter your phone number"
                required
              />
              <label class="profile-input-label" for="guestAddressInput"
                >Address</label
              >
              <textarea
                id="guestAddressInput"
                class="profile-input profile-textarea"
                rows="3"
                placeholder="Enter your address"
                required
              ></textarea>
              <label class="profile-input-label" for="guestStudentIdInput"
                >Student ID</label
              >
              <input
                id="guestStudentIdInput"
                class="profile-input"
                type="text"
                placeholder="Enter your student ID"
                required
              />
              <button type="submit" class="profile-save-btn">
                Save Information
              </button>
            </form>
          </div>
        </div>

        <div id="profileModal" class="profile-modal" aria-hidden="true">
          <div
            class="profile-modal-backdrop"
            onclick="closeProfileModal()"
          ></div>
          <div
            class="profile-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="profileTitle"
          >
            <div class="profile-modal-header">
              <h2 id="profileTitle">My Information</h2>
              <button
                type="button"
                class="profile-modal-close"
                onclick="closeProfileModal()"
                aria-label="Close profile"
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>

            <!-- GUEST MODE: Editable fields, no edit button, logout at bottom -->
            <div id="profileGuestFields" style="display: none">
              <form id="guestProfileForm" class="profile-form">
                <label class="profile-input-label" for="profileNameInput"
                  >Name</label
                >
                <input
                  id="profileNameInput"
                  class="profile-input"
                  type="text"
                  placeholder="Enter your name"
                  required
                />
                <label
                  class="profile-input-label"
                  for="guestProfileStudentIdInput"
                >
                  >Student ID</label
                >
                <input
                  id="guestProfileStudentIdInput"
                  class="profile-input"
                  type="text"
                  placeholder="Enter your student ID"
                  required
                />
                <button type="submit" class="profile-save-btn">
                  Save Information
                </button>
              </form>
            </div>

            <!-- LOGGED IN MODE: Standard display -->
            <div id="profileUserFields">
              <div class="profile-grid">
                <div class="profile-row">
                  <span class="profile-label">Name</span>
                  <span class="profile-value" id="profileName"
                    >Not provided</span
                  >
                </div>
                <div class="profile-row">
                  <span class="profile-label">Email</span>
                  <span class="profile-value" id="profileEmail"
                    >Not provided</span
                  >
                </div>
                <div class="profile-row">
                  <span class="profile-label">User ID</span>
                  <span class="profile-value" id="profileUid"
                    >Not provided</span
                  >
                </div>
                <!-- Student ID display row removed; use editable Student ID input below -->
              </div>
              <form class="profile-form" onsubmit="saveProfileInfo(event)">
                <label class="profile-input-label" for="profileNameEditInput"
                  >Name</label
                >
                <input
                  id="profileNameEditInput"
                  class="profile-input"
                  type="text"
                  placeholder="Enter your name"
                />
                <label class="profile-input-label" for="profileEmailEditInput"
                  >Email</label
                >
                <input
                  id="profileEmailEditInput"
                  class="profile-input"
                  type="email"
                  placeholder="Enter your email"
                />
                <label class="profile-input-label" for="profilePhoneInput"
                  >Phone Number</label
                >
                <input
                  id="profilePhoneInput"
                  class="profile-input"
                  type="tel"
                  placeholder="Enter your phone number"
                />
                <label class="profile-input-label" for="profileAddressInput"
                  >Address</label
                >
                <textarea
                  id="profileAddressInput"
                  class="profile-input profile-textarea"
                  rows="3"
                  placeholder="Enter your address"
                ></textarea>
                <label class="profile-input-label" for="profileStudentIdInput"
                  >Student ID</label
                >
                <input
                  id="profileStudentIdInput"
                  class="profile-input"
                  type="text"
                  placeholder="Enter your student ID"
                />
                <button
                  type="submit"
                  class="profile-save-btn"
                  id="profileSaveBtn"
                >
                  Save Information
                </button>
              </form>
            </div>

            <button
              id="logoutButton"
              class="profile-logout-btn"
              style="
                background: #e74c3c;
                color: #fff;
                width: 100%;
                padding: 0.75em;
                border: none;
                border-radius: 6px;
                font-size: 1em;
                cursor: pointer;
                margin-top: 2em;
              "
            >
              <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
          </div>
        </div>

        <div id="mapModal" class="map-modal" aria-hidden="true">
          <div class="map-modal-backdrop" onclick="closeMapModal()"></div>
          <div
            class="map-modal-card"
            role="dialog"
            aria-modal="true"
            aria-labelledby="mapModalTitle"
          >
            <div class="map-modal-header">
              <h2 id="mapModalTitle">Your Current Location</h2>
              <button
                type="button"
                class="map-modal-close"
                onclick="closeMapModal()"
                aria-label="Close map"
              >
                <i class="fa-solid fa-xmark"></i>
              </button>
            </div>
            <iframe
              id="mapFrame"
              class="map-frame"
              title="Google Maps current location"
              loading="lazy"
            ></iframe>
          </div>
        </div>

        <div class="panel-shell">
          <iframe
            id="panelFrame"
            class="panel-frame"
            title="Emergency panel"
            src="home-pane.html"
          ></iframe>
        </div>

        <!-- BOTTOM NAV -->
        <div class="bottom-nav">
          <div class="active" data-route="home" onclick="goHome()">
            <i class="fa-solid fa-house"></i>
          </div>
          <div data-route="history" onclick="goHistory()">
            <i class="fa-solid fa-clock-rotate-left"></i>
          </div>
          <div data-route="contact" onclick="goContact()">
            <i class="fa-solid fa-address-book"></i>
          </div>
          <div data-route="settings" onclick="goSettings()">
            <i class="fa-solid fa-gear"></i>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "firebase/app";
      import {
        doc,
        getDoc,
        getFirestore,
        serverTimestamp,
        setDoc,
      } from "firebase/firestore";
      import {
        getAuth,
        onAuthStateChanged,
        signInAnonymously,
      } from "firebase/auth";
      import { userSignOut } from "../api/auth.js";

      // Guest info helpers
      const GUEST_INFO_KEY = "guest_info";
      function getGuestInfo() {
        try {
          return JSON.parse(localStorage.getItem(GUEST_INFO_KEY) || "null");
        } catch {
          return null;
        }
      }
      function setGuestInfo(info) {
        localStorage.setItem(GUEST_INFO_KEY, JSON.stringify(info));
      }
      function clearGuestInfo() {
        localStorage.removeItem(GUEST_INFO_KEY);
      }
      function getGuestSessionId() {
        const key = "guest_session_id";
        let sessionId = localStorage.getItem(key);
        if (!sessionId) {
          sessionId = `guest_${Date.now()}_${Math.random()
            .toString(36)
            .slice(2, 10)}`;
          localStorage.setItem(key, sessionId);
        }
        return sessionId;
      }
      import {
        createSOSIncident,
        createEmergencyIncident,
      } from "../api/incidents.js";
      import {
        getDeviceLocation,
        requestLocationPermission,
      } from "../api/location.js";
      import {
        ensureEmergencyHotlineDatastore,
        getPrimaryEmergencyHotline,
      } from "../api/hotlines.js";
      import { showToast, showAlertModal } from "../api/notifications.js";

      // Firebase Config from environment variables
      const firebaseConfig = {
        apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
        authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
        projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
        storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
        messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
        appId: import.meta.env.VITE_FIREBASE_APP_ID,
      };

      // Initialize Firebase safely so the page still works even if env vars are missing.
      let db = null;
      let auth = null;
      const missingFirebaseKeys = Object.entries(firebaseConfig)
        .filter(([, value]) => !value)
        .map(([key]) => key);

      if (missingFirebaseKeys.length === 0) {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        auth = getAuth(app);
      } else {
        console.error(
          "Missing Firebase config keys:",
          missingFirebaseKeys.join(", "),
        );
      }

      // Global state
      let currentUser = null;
      let currentLocation = null;
      let currentProfileData = {};
      let didPromptLocationPermission = false;
      const PROFILE_EXTRAS_LOCAL_KEY = "profile_extras_local";
      const panelFrame = document.getElementById("panelFrame");
      const panelRoutes = {
        home: "home-pane.html",
        history: "history-pane.html",
        contact: "contact-pane.html",
        settings: "settings-pane.html",
      };

      function getSettingValue(key, fallback) {
        return localStorage.getItem(key) || fallback;
      }

      function getBoolSetting(key, fallback = true) {
        const value = localStorage.getItem(key);
        if (value === null) {
          return fallback;
        }
        return value === "true";
      }

      function readLocalProfileExtras() {
        try {
          const raw = localStorage.getItem(PROFILE_EXTRAS_LOCAL_KEY);
          const parsed = JSON.parse(raw || "{}");
          return typeof parsed === "object" && parsed ? parsed : {};
        } catch {
          return {};
        }
      }

      function writeLocalProfileExtras(extras) {
        localStorage.setItem(PROFILE_EXTRAS_LOCAL_KEY, JSON.stringify(extras));
      }

      function isGuestModeActive() {
        return !currentUser || currentUser.isAnonymous;
      }

      function applyGlobalTheme(theme) {
        const isDark =
          theme === "dark" ||
          (theme === "auto" &&
            window.matchMedia?.("(prefers-color-scheme: dark)")?.matches);

        document.documentElement.classList.toggle("theme-dark", isDark);
        document.body.classList.toggle("theme-dark", isDark);
      }

      function applyGlobalLanguage(language) {
        const profileTitle = document.getElementById("profileTitle");
        const mapTitle = document.getElementById("mapModalTitle");
        const locationDisplay = document.getElementById("locationDisplay");
        const userDisplay = document.getElementById("userDisplay");

        if (language === "tl") {
          if (profileTitle) {
            profileTitle.textContent = "Aking Impormasyon";
          }
          if (mapTitle) {
            mapTitle.textContent = "Kasalukuyang Lokasyon";
          }
          if (!currentLocation && locationDisplay) {
            locationDisplay.textContent = "Tingnan ang Iyong Lokasyon";
          }
          if (!currentUser && userDisplay) {
            userDisplay.textContent = "Mag-login gamit ang iyong PLP account";
          }
        } else {
          if (profileTitle) {
            profileTitle.textContent = "My Information";
          }
          if (mapTitle) {
            mapTitle.textContent = "Your Current Location";
          }
          if (!currentLocation && locationDisplay) {
            locationDisplay.textContent = "See your Location";
          }
          if (!currentUser && userDisplay) {
            userDisplay.textContent = "Login using your PLP Account";
          }
        }
      }

      function relaySettingToPane(key, value) {
        if (panelFrame?.contentWindow) {
          panelFrame.contentWindow.postMessage(
            { type: "setting-changed", key, value },
            "*",
          );
        }
      }

      function applyGlobalPreferences() {
        const theme = getSettingValue("theme", "light");
        const language = getSettingValue("language", "en");
        applyGlobalTheme(theme);
        applyGlobalLanguage(language);
      }

      // Make functions globally available
      window.goToProfile = goToProfile;
      window.closeProfileModal = closeProfileModal;
      window.getLocation = getLocation;
      window.triggerEmergency = triggerEmergency;
      window.triggerSOS = triggerSOS;
      window.goHome = goHome;
      window.goHistory = goHistory;
      window.goContact = goContact;
      window.goSettings = goSettings;
      window.closeProfileModal = closeProfileModal;
      window.closeMapModal = closeMapModal;
      window.saveProfileInfo = saveProfileInfo;
      window.appShell = {
        triggerEmergency,
        triggerSOS,
        goHome,
        goHistory,
        goContact,
        goSettings,
      };

      // Guest Info Modal logic
      const guestInfoModal = document.getElementById("guestInfoModal");
      const guestInfoForm = document.getElementById("guestInfoForm");
      function openGuestInfoModal() {
        guestInfoModal.style.display = "block";
        guestInfoModal.setAttribute("aria-hidden", "false");
        // Pre-fill if info exists
        const info = getGuestInfo();
        if (info) {
          document.getElementById("guestNameInput").value = info.name || "";
          document.getElementById("guestPhoneInput").value = info.phone || "";
          document.getElementById("guestAddressInput").value =
            info.address || "";
          document.getElementById("guestStudentIdInput").value =
            info.studentId || "";
        }
      }
      function closeGuestInfoModal() {
        guestInfoModal.style.display = "none";
        guestInfoModal.setAttribute("aria-hidden", "true");
      }
      window.closeGuestInfoModal = closeGuestInfoModal;
      guestInfoForm.addEventListener("submit", (e) => {
        e.preventDefault();
        const info = {
          name: document.getElementById("guestNameInput").value.trim(),
          phone: document.getElementById("guestPhoneInput").value.trim(),
          address: document.getElementById("guestAddressInput").value.trim(),
          studentId: document
            .getElementById("guestStudentIdInput")
            .value.trim(),
        };
        setGuestInfo(info);
        closeGuestInfoModal();
        showGuestInfoInProfile();
      });

      const guestProfileForm = document.getElementById("guestProfileForm");
      guestProfileForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const name = document.getElementById("profileNameInput").value.trim();
        const studentId = document
          .getElementById("guestProfileStudentIdInput")
          .value.trim();

        if (!name || !studentId) {
          showToast("Please fill in your name and student ID.", "error");
          return;
        }

        const existing = getGuestInfo() || {};
        const info = {
          ...existing,
          name,
          studentId,
        };
        setGuestInfo(info);
        showGuestInfoInProfile();

        if (db) {
          try {
            await setDoc(
              doc(db, "guest_profiles", getGuestSessionId()),
              {
                ...info,
                updatedAt: serverTimestamp(),
              },
              { merge: true },
            );
          } catch (error) {
            console.error("Unable to sync guest profile to Firestore:", error);
          }
        }

        showToast("Guest information saved.", "success");
      });

      function showGuestInfoInProfile() {
        const info = getGuestInfo();
        if (info) {
          document.getElementById("profileName").textContent =
            info.name || "Not provided";
          document.getElementById("profileEmail").textContent =
            info.email || "Guest User";
          document.getElementById("profileUid").textContent = "Not provided";
          setProfileInputValue("profileNameEditInput", info.name || "");
          setProfileInputValue("profileEmailEditInput", info.email || "");
          const guestNameInput = document.getElementById("profileNameInput");
          const guestStudentIdInput = document.getElementById(
            "guestProfileStudentIdInput",
          );
          const userStudentIdInput = document.getElementById(
            "profileStudentIdInput",
          );
          if (guestNameInput) {
            guestNameInput.value = info.name || "";
          }
          if (guestStudentIdInput) {
            guestStudentIdInput.value = info.studentId || "";
          }
          if (userStudentIdInput) {
            userStudentIdInput.value = info.studentId || "";
          }
        } else {
          document.getElementById("profileName").textContent = "Not provided";
          document.getElementById("profileEmail").textContent = "Not provided";
          document.getElementById("profileUid").textContent = "Not provided";
          setProfileInputValue("profileNameEditInput", "");
          setProfileInputValue("profileEmailEditInput", "");
          const guestNameInput = document.getElementById("profileNameInput");
          const guestStudentIdInput = document.getElementById(
            "guestProfileStudentIdInput",
          );
          const userStudentIdInput = document.getElementById(
            "profileStudentIdInput",
          );
          if (guestNameInput) {
            guestNameInput.value = "";
          }
          if (guestStudentIdInput) {
            guestStudentIdInput.value = "";
          }
          if (userStudentIdInput) {
            userStudentIdInput.value = "";
          }
        }
      }

      // Logout button logic
      const logoutButton = document.getElementById("logoutButton");
      if (logoutButton) {
        logoutButton.addEventListener("click", async () => {
          if (auth) {
            try {
              await userSignOut(auth);
              window.location.href = "login.html";
            } catch (e) {
              alert("Logout failed. Please try again.");
            }
          } else {
            window.location.href = "login.html";
          }
        });
      }

      /**
       * Initialize auth state listener
       */
      if (auth) {
        onAuthStateChanged(auth, (user) => {
          if (user && !user.isAnonymous) {
            currentUser = user;
            document.getElementById("userDisplay").textContent =
              `${user.displayName || user.email}`;
            populateProfileInfo();
            console.log("User logged in:", user.email);
          } else {
            currentUser = user && user.isAnonymous ? user : null;
            document.getElementById("userDisplay").textContent =
              "Login using your PLP Account";
            resetProfileInfo();
            // If guest info missing, show modal
            if (!getGuestInfo()) {
              openGuestInfoModal();
            } else {
              showGuestInfoInProfile();
            }
          }
        });
      }

      async function resolveIncidentUserIdForGuest() {
        if (!auth) {
          return getGuestSessionId();
        }

        if (auth.currentUser?.uid) {
          return auth.currentUser.uid;
        }

        try {
          const credential = await signInAnonymously(auth);
          currentUser = credential.user;
          return credential.user.uid;
        } catch (error) {
          console.error("Anonymous sign-in failed for guest incident:", error);
          return getGuestSessionId();
        }
      }

      function getProfileField(profile, keys) {
        for (const key of keys) {
          const value = profile?.[key];
          if (
            value !== undefined &&
            value !== null &&
            String(value).trim() !== ""
          ) {
            return String(value);
          }
        }
        return "Not provided";
      }

      function getReporterDetails() {
        const localExtras = readLocalProfileExtras();
        const callerName =
          getProfileField(currentProfileData, [
            "fullName",
            "name",
            "displayName",
          ]) !== "Not provided"
            ? getProfileField(currentProfileData, [
                "fullName",
                "name",
                "displayName",
              ])
            : currentUser?.displayName ||
              currentUser?.email ||
              "Unknown Caller";

        const contactValue = getProfileField(currentProfileData, [
          "phone",
          "phoneNumber",
          "mobile",
        ]);
        const contact =
          contactValue !== "Not provided"
            ? contactValue
            : currentUser?.phoneNumber ||
              localExtras.phone ||
              localExtras.phoneNumber ||
              "";

        return {
          callerName,
          contact,
          email: currentUser?.email || "",
        };
      }

      function setProfileField(id, value) {
        document.getElementById(id).textContent = value || "Not provided";
      }

      function setProfileInputValue(id, value) {
        const input = document.getElementById(id);
        input.value = value && value !== "Not provided" ? value : "";
      }

      function resetProfileInfo() {
        setProfileField("profileName", "Not provided");
        setProfileField("profileEmail", "Not provided");
        setProfileField("profileUid", "Not provided");
        setProfileInputValue("profileNameEditInput", "");
        setProfileInputValue("profileEmailEditInput", "");
        setProfileInputValue("profilePhoneInput", "");
        setProfileInputValue("profileAddressInput", "");
        setProfileInputValue("profileStudentIdInput", "");
      }

      async function populateProfileInfo() {
        if (!currentUser) {
          resetProfileInfo();
          return;
        }

        const localExtras = readLocalProfileExtras();
        let profileData = {};

        if (db) {
          try {
            const userDocRef = doc(db, "users", currentUser.uid);
            const userDocSnap = await getDoc(userDocRef);
            if (userDocSnap.exists()) {
              profileData = userDocSnap.data();
            }
          } catch (error) {
            console.error("Unable to load profile document:", error);
          }
        }

        const nameFromDb = getProfileField(profileData, [
          "fullName",
          "name",
          "displayName",
        ]);
        const name =
          nameFromDb !== "Not provided"
            ? nameFromDb
            : currentUser.displayName || "Not provided";

        const phoneFromDb = getProfileField(profileData, [
          "phone",
          "phoneNumber",
          "mobile",
        ]);
        const phone =
          phoneFromDb !== "Not provided"
            ? phoneFromDb
            : currentUser.phoneNumber || "Not provided";

        const address = getProfileField(profileData, [
          "address",
          "homeAddress",
          "residentialAddress",
          "currentAddress",
        ]);

        const studentId = getProfileField(profileData, [
          "studentId",
          "schoolId",
        ]);

        setProfileField("profileName", name);
        setProfileField("profileEmail", currentUser.email || "Not provided");
        setProfileField("profileUid", currentUser.uid || "Not provided");
        setProfileInputValue("profileNameEditInput", name);
        setProfileInputValue("profileEmailEditInput", currentUser.email || "");
        const resolvedStudentId =
          studentId !== "Not provided"
            ? studentId
            : localExtras.studentId || "Not provided";

        setProfileInputValue(
          "profilePhoneInput",
          phone !== "Not provided"
            ? phone
            : localExtras.phone || localExtras.phoneNumber || "",
        );
        setProfileInputValue(
          "profileAddressInput",
          address !== "Not provided" ? address : localExtras.address || "",
        );
        setProfileInputValue("profileStudentIdInput", resolvedStudentId);

        currentProfileData = profileData;
      }

      async function saveProfileInfo(event) {
        event.preventDefault();

        const nameInput = document.getElementById("profileNameEditInput");
        const emailInput = document.getElementById("profileEmailEditInput");
        const phoneInput = document.getElementById("profilePhoneInput");
        const addressInput = document.getElementById("profileAddressInput");
        const studentIdInput = document.getElementById("profileStudentIdInput");
        const saveBtn = document.getElementById("profileSaveBtn");

        const name = nameInput.value.trim();
        const email = emailInput.value.trim();
        const phone = phoneInput.value.trim();
        const address = addressInput.value.trim();
        const studentId = studentIdInput.value.trim();

        if (!name && !email && !phone && !address && !studentId) {
          showToast("Enter at least one profile field first.", "error");
          return;
        }

        if (!isGuestModeActive() && !db) {
          showToast("Database is not configured.", "error");
          return;
        }

        if (isGuestModeActive()) {
          const existingGuest = getGuestInfo() || {};
          const info = {
            ...existingGuest,
            name: name || existingGuest.name || "Guest User",
            email: email || existingGuest.email || "",
            phone,
            address,
            studentId,
          };

          setGuestInfo(info);

          if (db) {
            try {
              await setDoc(
                doc(db, "guest_profiles", getGuestSessionId()),
                {
                  ...info,
                  updatedAt: serverTimestamp(),
                },
                { merge: true },
              );
            } catch (error) {
              console.error(
                "Unable to sync guest profile to Firestore:",
                error,
              );
            }
          }

          showGuestInfoInProfile();
          showToast("Guest information saved.", "success");
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = "Saving...";

        try {
          const userDocRef = doc(db, "users", currentUser.uid);
          await setDoc(
            userDocRef,
            {
              uid: currentUser.uid,
              email: currentUser.email || "",
              displayName: currentUser.displayName || "",
              fullName:
                currentProfileData.fullName ||
                currentProfileData.name ||
                currentUser.displayName ||
                "",
              phone,
              phoneNumber: phone,
              address,
              studentId,
              schoolId: studentId,
              updatedAt: serverTimestamp(),
            },
            { merge: true },
          );

          writeLocalProfileExtras({
            studentId,
            phone,
            phoneNumber: phone,
            address,
          });

          showToast("Profile information saved.", "success");
          await populateProfileInfo();
        } catch (error) {
          console.error("Unable to save profile info:", error);
          showToast(
            error.message || "Failed to save profile information.",
            "error",
          );
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = "Save Information";
        }
      }

      /**
       * Trigger SOS incident
       */
      async function triggerSOS() {
        if (!getBoolSetting("locationShare", true)) {
          showToast(
            "Location sharing is disabled in Settings. Enable it to use SOS.",
            "error",
          );
          return;
        }
        try {
          showToast("Getting your location...", "info");
          const location = await getDeviceLocation();
          currentLocation = location;
          let reporter, uid;
          if (!isGuestModeActive()) {
            reporter = getReporterDetails();
            uid = currentUser.uid;
          } else {
            const guest = getGuestInfo();
            reporter = {
              callerName: guest?.name || "Guest User",
              contact: guest?.phone || "",
              email: "",
              address: guest?.address || "",
              studentId: guest?.studentId || "",
            };
            uid = await resolveIncidentUserIdForGuest();
          }
          const result = await createSOSIncident(db, uid, location, reporter);
          if (result.success) {
            if (getBoolSetting("autoCall", true)) {
              await triggerEmergencyHotlineCall();
            }
            showAlertModal(
              "SOS ACTIVATED",
              "Emergency responders have been notified of your location.",
              () => {
                loadPanel("history");
              },
            );
          } else {
            showToast("Failed to send SOS: " + result.error, "error");
          }
        } catch (error) {
          console.error("SOS error:", error);
          showToast("Error: " + error.message, "error");
        }
      }

      // Patch: Make other incident buttons work for guests
      window.triggerEmergency = async function (type) {
        if (!getBoolSetting("locationShare", true)) {
          showToast("Location sharing is disabled in Settings.", "error");
          return;
        }
        try {
          showToast("Getting your location...", "info");
          const location = await getDeviceLocation();
          currentLocation = location;
          let reporter, uid;
          if (!isGuestModeActive()) {
            reporter = getReporterDetails();
            uid = currentUser.uid;
          } else {
            const guest = getGuestInfo();
            reporter = {
              callerName: guest?.name || "Guest User",
              contact: guest?.phone || "",
              email: "",
              address: guest?.address || "",
              studentId: guest?.studentId || "",
            };
            uid = await resolveIncidentUserIdForGuest();
          }
          const result = await createEmergencyIncident(
            db,
            uid,
            type,
            location,
            "",
            reporter,
          );
          if (result.success) {
            showAlertModal(
              "Incident Reported",
              "Emergency responders have been notified of your location.",
              () => {
                loadPanel("history");
              },
            );
          } else {
            showToast("Failed to send incident: " + result.error, "error");
          }
        } catch (error) {
          console.error("Incident error:", error);
          showToast("Error: " + error.message, "error");
        }
      };

      function sanitizeDialNumber(rawPhoneNumber) {
        if (!rawPhoneNumber) {
          return "";
        }

        return String(rawPhoneNumber).replace(/[^\d+]/g, "");
      }

      async function triggerEmergencyHotlineCall() {
        const hotlineResult = await getPrimaryEmergencyHotline(db);

        if (!hotlineResult.success || !hotlineResult.hotline) {
          showToast(
            "SOS sent, but hotline record is missing in datastore.",
            "error",
          );
          return;
        }

        const hotlineNumber = hotlineResult.hotline.phoneNumber;
        const dialNumber = sanitizeDialNumber(hotlineNumber);

        if (!dialNumber) {
          showToast("SOS sent, but hotline number is not configured.", "error");
          return;
        }

        showToast(`Calling emergency hotline: ${hotlineNumber}`, "info");
        window.location.href = `tel:${dialNumber}`;
      }

      /**
       * Get and display device location
       */
      async function getLocation() {
        // Allow guests to get location
        if (!getBoolSetting("locationShare", true)) {
          showToast("Location sharing is disabled in Settings.", "error");
          return;
        }
        try {
          showToast("Getting location...", "info");
          const location = await getDeviceLocation();
          currentLocation = location;
          const coordText = `${location.latitude.toFixed(6)}, ${location.longitude.toFixed(6)}`;
          document.getElementById("locationDisplay").textContent = coordText;
          showToast(`Showing map: ${coordText}`, "success");
          openMapModal(location.latitude, location.longitude);
          console.log("Location:", location);
        } catch (error) {
          console.error("Location error:", error);
          showToast("Error: " + error.message, "error");
        }
      }

      function openMapModal(latitude, longitude) {
        const mapFrame = document.getElementById("mapFrame");
        const mapModal = document.getElementById("mapModal");
        const mapUrl = `https://maps.google.com/maps?q=${encodeURIComponent(
          `${latitude},${longitude}`,
        )}&z=16&output=embed`;

        mapFrame.src = mapUrl;
        mapModal.classList.add("is-open");
        mapModal.setAttribute("aria-hidden", "false");
      }

      function closeMapModal() {
        const mapModal = document.getElementById("mapModal");
        const mapFrame = document.getElementById("mapFrame");

        mapModal.classList.remove("is-open");
        mapModal.setAttribute("aria-hidden", "true");
        mapFrame.src = "";
      }

      /**
       * Trigger emergency by type
       */
      async function triggerEmergency(type) {
        if (!currentUser) {
          showToast("Please login first", "error");
          goToProfile();
          return;
        }

        if (!getBoolSetting("locationShare", true)) {
          showToast(
            "Location sharing is disabled in Settings. Enable it to send emergency incidents.",
            "error",
          );
          return;
        }

        try {
          showToast("Getting your location...", "info");
          const location = await getDeviceLocation();
          currentLocation = location;
          const reporter = getReporterDetails();

          const result = await createEmergencyIncident(
            db,
            currentUser.uid,
            type,
            location,
            "",
            reporter,
          );

          if (result.success) {
            loadPanel("history");
          } else {
            showToast("Failed to create incident: " + result.error, "error");
          }
        } catch (error) {
          console.error("Emergency error:", error);
          showToast("Error: " + error.message, "error");
        }
      }

      /**
       * Navigation functions
       */
      async function goToProfile() {
        const profileModal = document.getElementById("profileModal");
        const guestFields = document.getElementById("profileGuestFields");
        const userFields = document.getElementById("profileUserFields");
        const nameEditInput = document.getElementById("profileNameEditInput");
        const emailEditInput = document.getElementById("profileEmailEditInput");
        profileModal.classList.add("is-open");
        profileModal.style.display = "block";
        profileModal.setAttribute("aria-hidden", "false");
        if (!isGuestModeActive()) {
          nameEditInput.disabled = true;
          emailEditInput.disabled = true;
          guestFields.style.display = "none";
          userFields.style.display = "";
          await populateProfileInfo();
        } else {
          nameEditInput.disabled = false;
          emailEditInput.disabled = false;
          guestFields.style.display = "none";
          userFields.style.display = "";
          showGuestInfoInProfile();
        }
      }

      function closeProfileModal() {
        const profileModal = document.getElementById("profileModal");
        profileModal.classList.remove("is-open");
        profileModal.style.display = "none";
        profileModal.setAttribute("aria-hidden", "true");
      }

      function goHome() {
        loadPanel("home");
      }

      function goHistory() {
        loadPanel("history");
      }

      function goContact() {
        loadPanel("contact");
      }

      function goSettings() {
        loadPanel("settings");
      }

      function loadPanel(route) {
        const normalizedRoute = panelRoutes[route] ? route : "home";
        panelFrame.src = panelRoutes[normalizedRoute];
        panelFrame.onload = () => {
          relaySettingToPane("theme", getSettingValue("theme", "light"));
          relaySettingToPane("language", getSettingValue("language", "en"));
          relaySettingToPane("holdTime", getSettingValue("holdTime", "3"));
        };
        setActiveMenu(normalizedRoute);

        const nextUrl =
          normalizedRoute === "home"
            ? "home.html"
            : `home.html?panel=${normalizedRoute}`;
        window.history.replaceState({ route: normalizedRoute }, "", nextUrl);
      }

      /**
       * Set active menu on page load
       */
      function setActiveMenu(route) {
        const items = document.querySelectorAll(".bottom-nav [data-route]");
        items.forEach((item) =>
          item.classList.toggle("active", item.dataset.route === route),
        );
      }

      async function promptLocationPermissionOnStart() {
        if (didPromptLocationPermission) {
          return;
        }

        didPromptLocationPermission = true;

        try {
          const permission = await requestLocationPermission();
          if (!permission.granted) {
            showToast(
              permission.message ||
                "Please allow location permission for emergency features.",
              "error",
            );
          }
        } catch (error) {
          console.error("Permission prompt error:", error);
          showToast(
            "Unable to request location permission automatically.",
            "error",
          );
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        applyGlobalPreferences();

        if (!auth) {
          showToast(
            "Firebase config missing. Check your .env values.",
            "error",
          );
        }

        if (db) {
          ensureEmergencyHotlineDatastore(db).then((result) => {
            if (!result.success) {
              console.error(
                "Hotline datastore initialization failed:",
                result.error,
              );
            }
          });
        }

        const route = new URLSearchParams(window.location.search).get("panel");
        loadPanel(route || "home");

        document
          .querySelectorAll(".bottom-nav [data-route]")
          .forEach((item) => {
            item.addEventListener("click", () => {
              loadPanel(item.dataset.route);
            });
          });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape") {
            closeProfileModal();
            closeMapModal();
          }
        });

        window.addEventListener("message", (event) => {
          if (event.data?.type !== "setting-changed") {
            return;
          }

          if (event.data.key === "theme") {
            applyGlobalTheme(String(event.data.value));
          }

          if (event.data.key === "language") {
            applyGlobalLanguage(String(event.data.value));
          }

          relaySettingToPane(String(event.data.key), event.data.value);
        });

        window.addEventListener("storage", (event) => {
          if (event.key === "theme" || event.key === "language") {
            applyGlobalPreferences();
          }

          if (
            event.key === "theme" ||
            event.key === "language" ||
            event.key === "holdTime"
          ) {
            relaySettingToPane(
              event.key,
              event.newValue || getSettingValue(event.key, ""),
            );
          }
        });

        promptLocationPermissionOnStart();
      });
    </script>
  </body>
</html>
