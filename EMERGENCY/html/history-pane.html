<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>History Pane</title>
    <link rel="stylesheet" href="../css/history.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div class="screen">
      <h1>
        CALL <br />
        HISTORY
      </h1>
      <p class="sub">Your emergency call records</p>

      <div class="history-list" id="historyList">
        <div class="history-state">Loading your emergency history...</div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "firebase/app";
      import { getAuth, onAuthStateChanged } from "firebase/auth";
      import { getFirestore } from "firebase/firestore";
      import { getUserIncidents } from "../api/incidents.js";

      const historyList = document.getElementById("historyList");

      const firebaseConfig = {
        apiKey: import.meta.env.VITE_FIREBASE_API_KEY,
        authDomain: import.meta.env.VITE_FIREBASE_AUTH_DOMAIN,
        projectId: import.meta.env.VITE_FIREBASE_PROJECT_ID,
        storageBucket: import.meta.env.VITE_FIREBASE_STORAGE_BUCKET,
        messagingSenderId: import.meta.env.VITE_FIREBASE_MESSAGING_SENDER_ID,
        appId: import.meta.env.VITE_FIREBASE_APP_ID,
      };

      const incidentTypeConfig = {
        sos: {
          label: "SOS Emergency",
          icon: "fa-triangle-exclamation",
        },
        injury: {
          label: "Medical Emergency",
          icon: "fa-user-injured",
        },
        fire: {
          label: "Fire Incident",
          icon: "fa-fire",
        },
        crime: {
          label: "Security Incident",
          icon: "fa-shield-halved",
        },
        accident: {
          label: "Accident",
          icon: "fa-car-burst",
        },
      };
      const placeNameCache = new Map();

      function setHistoryState(message, tone = "") {
        historyList.innerHTML = `<div class="history-state ${tone}">${message}</div>`;
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function getIncidentTypeConfig(type) {
        return (
          incidentTypeConfig[type] || {
            label: "Emergency Incident",
            icon: "fa-bell",
          }
        );
      }

      function formatTimestamp(timestamp) {
        if (!timestamp?.toDate) {
          return "Date unavailable";
        }

        const date = timestamp.toDate();
        const now = new Date();
        const isToday = date.toDateString() === now.toDateString();
        const yesterday = new Date(now);
        yesterday.setDate(now.getDate() - 1);
        const isYesterday = date.toDateString() === yesterday.toDateString();
        const timeText = date.toLocaleTimeString([], {
          hour: "numeric",
          minute: "2-digit",
        });

        if (isToday) {
          return `Today, ${timeText}`;
        }

        if (isYesterday) {
          return `Yesterday, ${timeText}`;
        }

        return date.toLocaleString([], {
          month: "short",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit",
        });
      }

      function formatCoordinates(location) {
        const lat = Number(location?.lat);
        const lng = Number(location?.lng);

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return "Location unavailable";
        }

        return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
      }

      function buildReadablePlaceName(result) {
        const address = result?.address || {};
        const parts = [
          address.amenity,
          address.building,
          address.house_number,
          address.road,
          address.neighbourhood,
          address.suburb,
          address.village,
          address.town,
          address.city,
          address.state,
        ].filter(Boolean);

        if (parts.length > 0) {
          return [...new Set(parts)].slice(0, 4).join(", ");
        }

        return result?.display_name || null;
      }

      async function reverseGeocodeLocation(location) {
        const lat = Number(location?.lat);
        const lng = Number(location?.lng);

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return "Location unavailable";
        }

        const cacheKey = `${lat.toFixed(5)},${lng.toFixed(5)}`;

        if (placeNameCache.has(cacheKey)) {
          return placeNameCache.get(cacheKey);
        }

        const fallback = formatCoordinates(location);

        try {
          const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}&zoom=18&addressdetails=1`,
            {
              headers: {
                Accept: "application/json",
              },
            },
          );

          if (!response.ok) {
            throw new Error(
              `Reverse geocoding failed with status ${response.status}`,
            );
          }

          const result = await response.json();
          const placeName = buildReadablePlaceName(result) || fallback;
          placeNameCache.set(cacheKey, placeName);
          return placeName;
        } catch (error) {
          console.warn("Unable to resolve place name for history item:", error);
          placeNameCache.set(cacheKey, fallback);
          return fallback;
        }
      }

      function formatAccuracy(location) {
        const accuracy = Number(location?.accuracy);

        if (!Number.isFinite(accuracy)) {
          return "Unavailable";
        }

        return `${Math.round(accuracy)} meters`;
      }

      function formatStatus(status) {
        if (!status) {
          return "Unknown";
        }

        return status.charAt(0).toUpperCase() + status.slice(1);
      }

      function renderHistoryItems(incidents) {
        if (!incidents.length) {
          setHistoryState("No emergency records found yet.");
          return;
        }

        historyList.innerHTML = incidents
          .map((incident) => {
            const typeConfig = getIncidentTypeConfig(incident.type);
            const description =
              incident.description?.trim() || "No description provided.";
            const placeName =
              incident.placeName || formatCoordinates(incident.location);

            return `
            <div class="history-item">
              <button class="history-summary" type="button">
                <div class="history-icon"><i class="fa-solid ${typeConfig.icon}"></i></div>
                <div class="history-info">
                  <div class="history-type">${escapeHtml(typeConfig.label)}</div>
                    <div class="history-meta">${escapeHtml(formatTimestamp(incident.createdAt))} • ${escapeHtml(placeName)}</div>
                </div>
                <div class="history-arrow"><i class="fa-solid fa-chevron-down"></i></div>
              </button>
              <div class="history-details">
                <div class="detail-row"><span class="detail-label">Incident ID:</span><span class="detail-value">${escapeHtml(incident.id)}</span></div>
                <div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value">${escapeHtml(formatStatus(incident.status))}</span></div>
                  <div class="detail-row"><span class="detail-label">Location:</span><span class="detail-value">${escapeHtml(placeName)}</span></div>
                  <div class="detail-row"><span class="detail-label">Coordinates:</span><span class="detail-value">${escapeHtml(formatCoordinates(incident.location))}</span></div>
                <div class="detail-row"><span class="detail-label">Accuracy:</span><span class="detail-value">${escapeHtml(formatAccuracy(incident.location))}</span></div>
                <div class="detail-row"><span class="detail-label">Description:</span><span class="detail-value">${escapeHtml(description)}</span></div>
              </div>
            </div>
          `;
          })
          .join("");

        historyList.querySelectorAll(".history-summary").forEach((button) => {
          button.addEventListener("click", () => {
            const item = button.closest(".history-item");
            item.classList.toggle("expanded");
          });
        });
      }

      async function loadHistory(userId, db) {
        setHistoryState("Loading your emergency history...");

        const result = await getUserIncidents(db, userId);

        if (!result.success) {
          setHistoryState(
            "Unable to load your history right now.",
            "history-state-error",
          );
          return;
        }

        const incidents = [...result.incidents].sort((left, right) => {
          const leftTime = left.createdAt?.seconds || 0;
          const rightTime = right.createdAt?.seconds || 0;
          return rightTime - leftTime;
        });

        const incidentsWithPlaces = await Promise.all(
          incidents.map(async (incident) => ({
            ...incident,
            placeName: await reverseGeocodeLocation(incident.location),
          })),
        );

        renderHistoryItems(incidentsWithPlaces);
      }

      const missingFirebaseKeys = Object.entries(firebaseConfig)
        .filter(([, value]) => !value)
        .map(([key]) => key);

      if (missingFirebaseKeys.length > 0) {
        console.error(
          "Missing Firebase config keys:",
          missingFirebaseKeys.join(", "),
        );
        setHistoryState(
          "Firebase is not configured for this page.",
          "history-state-error",
        );
      } else {
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
          if (!user) {
            setHistoryState("Sign in to view your emergency history.");
            return;
          }

          loadHistory(user.uid, db);
        });
      }
    </script>
  </body>
</html>
