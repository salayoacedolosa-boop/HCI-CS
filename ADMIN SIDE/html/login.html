<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Emergency Response</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/login.css" />
    <style>
      .login-message {
        margin-top: 8px;
        min-height: 20px;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h1>Welcome Back</h1>
      <p class="subtext">Emergency Response System</p>

      <!-- USERNAME -->
      <div class="input-group">
        <input type="text" id="username" placeholder="Username or Email" />
        <i class="fa fa-user"></i>
      </div>

      <!-- PASSWORD -->
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" />
        <i class="fa fa-eye" id="togglePassword"></i>
      </div>

      <!-- LOGIN BUTTON -->
      <button class="login-btn" id="loginBtn">Login</button>

      <p id="loginMessage" class="subtext login-message"></p>

      <!-- FORGOT PASSWORD -->
      <div class="forgot">
        <a href="#">Forgot Password?</a>
      </div>

      <div class="footer">PLP Emergency Response System</div>
    </div>

    <script type="module">
      import { signInAdmin } from "../api/firebase_admin.js";

      const passwordInput = document.getElementById("password");
      const usernameInput = document.getElementById("username");
      const togglePasswordButton = document.getElementById("togglePassword");
      const loginBtn = document.getElementById("loginBtn");
      const loginMessage = document.getElementById("loginMessage");

      function setMessage(text, isError = false) {
        loginMessage.textContent = text;
        loginMessage.style.color = isError ? "#ff5f5f" : "#d8e9dd";
      }

      function togglePassword() {
        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          togglePasswordButton.classList.remove("fa-eye");
          togglePasswordButton.classList.add("fa-eye-slash");
          return;
        }

        passwordInput.type = "password";
        togglePasswordButton.classList.remove("fa-eye-slash");
        togglePasswordButton.classList.add("fa-eye");
      }

      async function handleLogin() {
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!username || !password) {
          setMessage("Please enter username/email and password.", true);
          return;
        }

        loginBtn.disabled = true;
        setMessage("Signing in...");

        try {
          await signInAdmin(username, password);
          setMessage("Login successful. Redirecting...");
          window.location.href = "menu.html";
        } catch (error) {
          setMessage(error.message || "Unable to sign in.", true);
        } finally {
          loginBtn.disabled = false;
        }
      }

      togglePasswordButton.addEventListener("click", togglePassword);
      loginBtn.addEventListener("click", handleLogin);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          handleLogin();
        }
      });
    </script>
  </body>
</html>
