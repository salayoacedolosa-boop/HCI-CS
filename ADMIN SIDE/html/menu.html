<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Response Admin Dashboard</title>
    <link rel="stylesheet" href="../css/menu.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      #logoutBtn {
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="dashboard">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h2>PLP Emergency Response</h2>

        <ul>
          <!-- LIVE MAP (LANDING PAGE) -->
          <li onclick="loadPage('map.html', this)" class="active">
            <i class="fa fa-map"></i> Live Map
          </li>

          <li onclick="loadPage('incidents.html', this)">
            <i class="fa fa-exclamation-triangle"></i> Incidents
          </li>

          <li onclick="loadPage('responders.html', this)">
            <i class="fa fa-user-shield"></i> Responders
          </li>

          <li onclick="loadPage('reports.html', this)">
            <i class="fa fa-chart-bar"></i> Reports
          </li>

          <li onclick="loadPage('settings.html', this)">
            <i class="fa fa-cog"></i> Settings
          </li>
        </ul>

        <!-- FOOTER -->
        <div class="sidebar-footer">
          <div>
            <i class="fa fa-user"></i>
            <span id="adminLabel">Admin User</span>
          </div>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- MAIN CONTENT -->
      <div class="main-content">
        <!-- TOP BAR -->
        <div class="topbar">
          <h1>Welcome, Admin</h1>
        </div>

        <!-- CONTENT FRAME (LANDING PAGE = MAP) -->
        <iframe id="contentFrame" src="map.html" title="Admin content"></iframe>
      </div>
    </div>

    <script type="module">
      import {
        requireAdminSession,
        signOutAdmin,
      } from "../api/firebase_admin.js";

      const titles = {
        "map.html": "Live Map",
        "incidents.html": "Incidents",
        "responders.html": "Responders",
        "reports.html": "Reports",
        "settings.html": "Settings",
      };

      function loadPage(page, el) {
        document.getElementById("contentFrame").src = page;

        document.querySelectorAll(".sidebar li").forEach((li) => {
          li.classList.remove("active");
        });

        el.classList.add("active");
        document.querySelector(".topbar h1").innerText =
          titles[page] || "Dashboard";
      }

      window.loadPage = loadPage;

      try {
        const { profile } = await requireAdminSession({ autoRedirect: true });
        const label = profile.displayName || profile.username || "Admin User";
        document.getElementById("adminLabel").textContent = label;
      } catch {
        // Redirect is handled by requireAdminSession.
      }

      document
        .getElementById("logoutBtn")
        .addEventListener("click", async () => {
          await signOutAdmin();
          window.location.href = "login.html";
        });
    </script>
  </body>
</html>
