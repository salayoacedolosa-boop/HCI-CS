<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports & Analytics</title>

    <link rel="stylesheet" href="../css/reports.css" />
    <link rel="stylesheet" href="../css/page-loader.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>

  <body>
    <div id="pageLoader" class="page-loader" aria-live="polite">
      <div class="page-loader-spinner"></div>
      <div class="page-loader-text">Loading reports...</div>
    </div>
    <div class="header">
      <h2>Reports & Analytics</h2>
    </div>

    <h3 class="section-title">Real-Time Operations</h3>

    <div class="stats-grid">
      <div class="stat-card">
        <h3>Active Incidents</h3>
        <p id="activeIncidents">0</p>
      </div>
      <div class="stat-card">
        <h3>Available Responders</h3>
        <p>5</p>
      </div>
      <div class="stat-card">
        <h3>Evacuation</h3>
        <p>78%</p>
      </div>
    </div>

    <!-- SIDE BY SIDE -->
    <div class="row-flex">
      <div class="chart-container chart-small">
        <h3>Incident Distribution</h3>
        <canvas id="incidentChart"></canvas>
      </div>

      <div class="chart-container table-side">
        <h3>Incident Documentation</h3>
        <table class="report-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Location</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="incidentTable"></tbody>
        </table>
      </div>
    </div>

    <!-- =========================
   📡 COMMUNICATION LOGS
========================= -->
    <h3 class="section-title">Communication Logs</h3>

    <div class="chart-container">
      <table class="report-table">
        <thead>
          <tr>
            <th>Message</th>
            <th>Receiver</th>
            <th>Status</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="logTable"></tbody>
      </table>
    </div>

    <script type="module">
      import {
        formatTimestamp,
        getIncidentTypeLabel,
        inferIncidentLocation,
        requireAdminSession,
        subscribeCommunicationLogs,
        subscribeHotlines,
        subscribeIncidents,
      } from "../api/firebase_admin.js";

      const activeIncidentsEl = document.getElementById("activeIncidents");
      const incidentTable = document.getElementById("incidentTable");
      const logTable = document.getElementById("logTable");
      const responderCountEl = document.querySelector(
        ".stats-grid .stat-card:nth-child(2) p",
      );
      const evacuationEl = document.querySelector(
        ".stats-grid .stat-card:nth-child(3) p",
      );

      const ctx = document.getElementById("incidentChart").getContext("2d");
      const pageLoader = document.getElementById("pageLoader");
      let assetsReady = true;
      let incidentsReady = false;
      let logsReady = false;
      let hotlinesReady = false;
      let loaderHidden = false;

      function hidePageLoader() {
        if (loaderHidden) {
          return;
        }
        loaderHidden = true;
        document.body.classList.add("page-ready");
        pageLoader?.classList.add("hide");
        setTimeout(() => pageLoader?.remove(), 250);
      }

      function tryShowPage() {
        if (assetsReady && incidentsReady && logsReady && hotlinesReady) {
          hidePageLoader();
        }
      }

      const fireGradient = ctx.createLinearGradient(0, 0, 0, 250);
      fireGradient.addColorStop(0, "#ff7b00");
      fireGradient.addColorStop(1, "#ff3c00");

      const medicalGradient = ctx.createLinearGradient(0, 0, 0, 250);
      medicalGradient.addColorStop(0, "#ff4d4d");
      medicalGradient.addColorStop(1, "#b30000");

      const accidentGradient = ctx.createLinearGradient(0, 0, 0, 250);
      accidentGradient.addColorStop(0, "#ffd633");
      accidentGradient.addColorStop(1, "#e6ac00");

      const sosGradient = ctx.createLinearGradient(0, 0, 0, 250);
      sosGradient.addColorStop(0, "#40c4ff");
      sosGradient.addColorStop(1, "#0077b6");

      const otherGradient = ctx.createLinearGradient(0, 0, 0, 250);
      otherGradient.addColorStop(0, "#9e9e9e");
      otherGradient.addColorStop(1, "#4f4f4f");

      const chart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Fire", "Medical", "Accident", "SOS", "Others"],
          datasets: [
            {
              data: [0, 0, 0, 0, 0],
              backgroundColor: [
                fireGradient,
                medicalGradient,
                accidentGradient,
                sosGradient,
                otherGradient,
              ],
              borderRadius: 6,
            },
          ],
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#ccc" }, grid: { display: false } },
            y: {
              ticks: { color: "#ccc" },
              grid: { color: "rgba(255,255,255,0.05)" },
            },
          },
        },
      });

      function updateChart(incidents) {
        let fire = 0;
        let medical = 0;
        let accident = 0;
        let sos = 0;
        let other = 0;

        incidents.forEach((incident) => {
          const type = String(incident.type || "").toLowerCase();
          if (type === "fire") fire += 1;
          else if (type === "medical") medical += 1;
          else if (type === "accident") accident += 1;
          else if (type === "sos") sos += 1;
          else other += 1;
        });

        chart.data.datasets[0].data = [fire, medical, accident, sos, other];
        chart.update();
      }

      function renderIncidentRows(incidents) {
        incidentTable.innerHTML = "";

        incidents.slice(0, 20).forEach((incident) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${formatTimestamp(incident.createdAt)}</td>
            <td>${inferIncidentLocation(incident)}</td>
            <td>${getIncidentTypeLabel(incident.type)}</td>
            <td>${String(incident.status || "active").toUpperCase()}</td>
        `;
          incidentTable.appendChild(row);
        });
      }

      function renderLogs(logs) {
        logTable.innerHTML = "";

        logs.slice(0, 30).forEach((log) => {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${log.message || "-"}</td>
            <td>${log.receiver || "-"}</td>
            <td>${log.status || "-"}</td>
            <td>${formatTimestamp(log.createdAt)}</td>
        `;
          logTable.appendChild(row);
        });
      }

      await requireAdminSession({ autoRedirect: true });
      setTimeout(hidePageLoader, 4500);

      subscribeIncidents((incidents) => {
        const activeCount = incidents.filter((incident) => {
          const status = String(incident.status || "").toLowerCase();
          return status === "active" || status === "dispatched";
        }).length;

        activeIncidentsEl.textContent = String(activeCount);
        renderIncidentRows(incidents);
        updateChart(incidents);

        const resolved = incidents.filter(
          (incident) =>
            String(incident.status || "").toLowerCase() === "resolved",
        ).length;
        const evacuationRate = incidents.length
          ? Math.round((resolved / incidents.length) * 100)
          : 0;
        evacuationEl.textContent = `${evacuationRate}%`;
        incidentsReady = true;
        tryShowPage();
      });

      subscribeCommunicationLogs((logs) => {
        renderLogs(logs);
        logsReady = true;
        tryShowPage();
      });

      subscribeHotlines((hotlines) => {
        responderCountEl.textContent = String(hotlines.length);
        hotlinesReady = true;
        tryShowPage();
      });
    </script>
  </body>
</html>
