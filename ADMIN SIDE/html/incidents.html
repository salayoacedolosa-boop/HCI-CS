<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Incidents</title>

    <link rel="stylesheet" href="../css/incidents.css" />
    <link rel="stylesheet" href="../css/page-loader.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="pageLoader" class="page-loader" aria-live="polite">
      <div class="page-loader-spinner"></div>
      <div class="page-loader-text">Loading incidents...</div>
    </div>
    <div class="header">
      <h2>Incident Reports</h2>
    </div>

    <div class="controls">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search..." />
        <i class="fa fa-search"></i>
      </div>

      <div class="custom-select" id="customSelect">
        <div class="select-selected">All</div>
        <div class="select-items">
          <div data-value="all">All</div>
          <div data-value="active">Active</div>
          <div data-value="dispatched">Dispatched</div>
          <div data-value="resolved">Resolved</div>
        </div>
      </div>

      <button class="add-btn" onclick="openModal()" title="Dispatch units">
        <i class="fa fa-truck-medical"></i>
      </button>
    </div>

    <div class="incidents-grid" id="incidentContainer"></div>

    <div class="modal" id="incidentModal">
      <div class="modal-content emergency dispatch-ui">
        <div class="modal-header">
          <h3>Dispatch Units</h3>
          <span class="close" onclick="closeModal()">&times;</span>
        </div>

        <div class="modal-body">
          <label for="callerSelect">Active Caller</label>
          <select id="callerSelect" title="Choose active caller"></select>

          <div class="dispatch-summary" id="dispatchSummary">
            <div>
              <span>Contact</span><strong id="dispatchContact">-</strong>
            </div>
            <div>
              <span>Incident</span><strong id="dispatchIncidentType">-</strong>
            </div>
          </div>

          <label>Which unit to send?</label>
          <div class="btn-group" id="unitGroup">
            <button class="active">Police</button>
            <button>Fire</button>
            <button>Rescue</button>
            <button>Medical</button>
          </div>

          <label for="incidentType">Type of incident</label>
          <input id="incidentType" type="text" readonly />

          <label for="problemText">What is the problem?</label>
          <textarea id="problemText" rows="3" readonly></textarea>

          <hr />

          <label for="location">Specific location</label>
          <div class="location-input readonly">
            <input type="text" id="location" readonly />
          </div>

          <label for="hotlineSelect">Emergency hotline</label>
          <select id="hotlineSelect" title="Choose emergency hotline"></select>

          <div id="customHotlineFields" class="custom-hotline-fields hidden">
            <input
              type="text"
              id="customHotlineName"
              placeholder="Custom hotline name"
            />
            <input
              type="text"
              id="customHotlineNumber"
              placeholder="Custom hotline number"
            />
          </div>

          <label for="dispatchNotes">Dispatch notes</label>
          <textarea
            id="dispatchNotes"
            rows="2"
            placeholder="Optional notes for responders"
          ></textarea>

          <label for="dangerRange">Rate the danger level</label>
          <input
            type="range"
            id="dangerRange"
            class="range"
            min="1"
            max="10"
            value="5"
            title="Danger level: 5"
          />
          <div class="range-value">
            Danger level: <span id="dangerValue">5</span>/10
          </div>
        </div>

        <div class="modal-footer">
          <button class="save-btn" onclick="dispatchIncident()">
            DISPATCH &amp; PRINT REPORT
          </button>
        </div>
      </div>
    </div>

    <div class="modal" id="locationModal">
      <div class="modal-content map-modal-content">
        <div class="modal-header">
          <h3>Incident Location</h3>
          <span class="close" onclick="closeLocationModal()">&times;</span>
        </div>
        <div class="map-modal-body">
          <div id="mapLocationText" class="map-location-text">-</div>
          <iframe
            id="mapFrame"
            class="map-frame"
            title="Incident location map"
            loading="lazy"
          ></iframe>
          <div class="map-actions">
            <a
              id="mapExternalLink"
              class="open-map-link"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              >Open in Google Maps</a
            >
          </div>
        </div>
      </div>
    </div>

    <div class="modal" id="actionConfirmModal">
      <div class="modal-content map-modal-content">
        <div class="modal-header">
          <h3 id="actionConfirmTitle">Confirm Action</h3>
          <span class="close" id="actionConfirmClose">&times;</span>
        </div>
        <div class="map-modal-body">
          <p id="actionConfirmMessage" class="action-confirm-message">-</p>
          <div class="map-actions map-actions-flex">
            <button class="btn" id="actionConfirmCancel">Cancel</button>
            <button class="btn" id="actionConfirmOk">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        formatTimestamp,
        getIncidentTypeLabel,
        inferIncidentLocation,
        logDispatch,
        requireAdminSession,
        subscribeHotlines,
        subscribeIncidents,
        deleteIncident,
        updateIncidentStatus,
      } from "../api/firebase_admin.js";

      const modal = document.getElementById("incidentModal");
      const locationModal = document.getElementById("locationModal");
      const mapFrame = document.getElementById("mapFrame");
      const mapLocationText = document.getElementById("mapLocationText");
      const mapExternalLink = document.getElementById("mapExternalLink");
      const actionConfirmModal = document.getElementById("actionConfirmModal");
      const actionConfirmTitle = document.getElementById("actionConfirmTitle");
      const actionConfirmMessage = document.getElementById(
        "actionConfirmMessage",
      );
      const actionConfirmClose = document.getElementById("actionConfirmClose");
      const actionConfirmCancel = document.getElementById(
        "actionConfirmCancel",
      );
      const actionConfirmOk = document.getElementById("actionConfirmOk");
      const incidentContainer = document.getElementById("incidentContainer");
      const searchInput = document.getElementById("searchInput");
      const selectRoot = document.getElementById("customSelect");
      const selectedFilter = selectRoot.querySelector(".select-selected");
      const filterOptions = selectRoot.querySelectorAll(".select-items div");
      const callerSelect = document.getElementById("callerSelect");
      const hotlineSelect = document.getElementById("hotlineSelect");
      const customHotlineFields = document.getElementById(
        "customHotlineFields",
      );
      const customHotlineName = document.getElementById("customHotlineName");
      const customHotlineNumber = document.getElementById(
        "customHotlineNumber",
      );
      const pageLoader = document.getElementById("pageLoader");
      const locationNameCache = new Map();

      let activeFilter = "all";
      let incidents = [];
      let hotlines = [];
      let selectedIncidentId = "";
      let onActionConfirm = null;
      let assetsReady = document.readyState === "complete";
      let incidentsReady = false;
      let hotlinesReady = false;

      function hidePageLoader() {
        document.body.classList.add("page-ready");
        pageLoader?.classList.add("hide");
        setTimeout(() => pageLoader?.remove(), 250);
      }

      function tryShowPage() {
        if (assetsReady && incidentsReady && hotlinesReady) {
          hidePageLoader();
        }
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function openActionConfirmModal({
        title = "Confirm Action",
        message = "Are you sure?",
        confirmText = "Confirm",
        confirmColor = "#1f6feb",
        onConfirm = null,
      }) {
        actionConfirmTitle.textContent = title;
        actionConfirmMessage.textContent = message;
        actionConfirmOk.textContent = confirmText;
        actionConfirmOk.style.background = confirmColor;
        actionConfirmOk.style.color = "#fff";
        onActionConfirm = typeof onConfirm === "function" ? onConfirm : null;
        actionConfirmModal.classList.add("show");
      }

      function closeActionConfirmModal() {
        actionConfirmModal.classList.remove("show");
        onActionConfirm = null;
      }

      function openCallTestModal(number) {
        const sanitizedNumber = String(number || "").trim() || "N/A";
        openActionConfirmModal({
          title: "Test Call",
          message: `Dial this number for testing?\n${sanitizedNumber}`,
          confirmText: "Call Now",
          onConfirm: () => {
            if (sanitizedNumber !== "N/A") {
              window.location.href = "tel:" + sanitizedNumber;
            }
          },
        });
      }

      async function resolveLocationName(incident) {
        if (incident?.location?.label) {
          return incident.location.label;
        }
        if (incident?.locationName) {
          return String(incident.locationName);
        }

        const lat = incident?.location?.lat;
        const lng = incident?.location?.lng;
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return inferIncidentLocation(incident);
        }

        const cacheKey = `${lat.toFixed(6)},${lng.toFixed(6)}`;
        if (locationNameCache.has(cacheKey)) {
          return locationNameCache.get(cacheKey);
        }

        const fallback = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        try {
          const response = await fetch(
            `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(String(lat))}&lon=${encodeURIComponent(String(lng))}`,
          );
          if (!response.ok) {
            locationNameCache.set(cacheKey, fallback);
            return fallback;
          }
          const data = await response.json();
          const locationName =
            data?.name || data?.display_name || data?.address?.road || fallback;
          locationNameCache.set(cacheKey, locationName);
          return locationName;
        } catch {
          locationNameCache.set(cacheKey, fallback);
          return fallback;
        }
      }

      function getRecommendedUnit(type) {
        const normalized = String(type || "")
          .toLowerCase()
          .trim();
        if (normalized === "fire") {
          return "Fire";
        }
        if (normalized === "medical" || normalized === "injury") {
          return "Medical";
        }
        if (normalized === "accident") {
          return "Rescue";
        }
        return "Police";
      }

      function setActiveUnit(unitLabel) {
        const buttons = document.querySelectorAll("#unitGroup button");
        buttons.forEach((btn) => {
          btn.classList.toggle(
            "active",
            btn.textContent.trim().toLowerCase() ===
              String(unitLabel || "").toLowerCase(),
          );
        });
      }

      function renderHotlineOptions() {
        const items = hotlines.filter((item) => item.isActive !== false);
        hotlineSelect.innerHTML =
          '<option value="">Select hotline...</option>' +
          items
            .map(
              (item) =>
                `<option value="${escapeHtml(item.id)}" data-phone="${escapeHtml(item.phoneNumber || item.contact || "")}">${escapeHtml(item.name || "Unnamed Hotline")} - ${escapeHtml(item.phoneNumber || item.contact || "N/A")}</option>`,
            )
            .join("") +
          '<option value="custom">Custom hotline</option>';
      }

      function renderCallerOptions() {
        const activeIncidents = incidents.filter(
          (incident) =>
            String(incident.status || "").toLowerCase() === "active",
        );

        callerSelect.innerHTML =
          '<option value="">Select active incident caller...</option>' +
          activeIncidents
            .map((incident) => {
              const caller = incident.callerName || "Unknown Caller";
              const label = `${caller} - ${getIncidentTypeLabel(incident.type)} - ${inferIncidentLocation(incident)}`;
              return `<option value="${escapeHtml(incident.id)}">${escapeHtml(label)}</option>`;
            })
            .join("");

        if (!activeIncidents.length) {
          callerSelect.innerHTML =
            '<option value="">No active callers available</option>';
        }
      }

      function populateModalFromIncident(incidentId) {
        const target = incidents.find((item) => item.id === incidentId);
        if (!target) {
          return;
        }

        selectedIncidentId = target.id;
        callerSelect.value = target.id;

        const recommendedUnit = getRecommendedUnit(target.type);
        setActiveUnit(recommendedUnit);

        document.getElementById("dispatchContact").textContent =
          target.contact || "N/A";
        document.getElementById("dispatchIncidentType").textContent =
          getIncidentTypeLabel(target.type);
        document.getElementById("incidentType").value = getIncidentTypeLabel(
          target.type,
        );
        document.getElementById("problemText").value =
          target.description || "No description provided.";
        document.getElementById("location").value =
          inferIncidentLocation(target);

        const existingDanger = Number(target.metadata?.dangerLevel || 5);
        const normalizedDanger = Number.isFinite(existingDanger)
          ? Math.min(10, Math.max(1, existingDanger))
          : 5;
        document.getElementById("dangerRange").value = normalizedDanger;
        document.getElementById("dangerValue").textContent = normalizedDanger;

        if (hotlineSelect.options.length > 1) {
          hotlineSelect.selectedIndex = 1;
        }
        customHotlineFields.classList.add("hidden");
      }

      function openModal(preselectedIncidentId = "") {
        renderCallerOptions();
        renderHotlineOptions();
        document.getElementById("dispatchNotes").value = "";
        selectedIncidentId = "";

        if (preselectedIncidentId) {
          populateModalFromIncident(preselectedIncidentId);
        }

        modal.classList.add("show");
        setTimeout(() => callerSelect.focus(), 80);
      }

      function closeModal() {
        modal.classList.remove("show");
      }

      function openLocationModal(lat, lng, label = "") {
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          alert("Location coordinates are not available for this incident.");
          return;
        }

        const encodedCoords = encodeURIComponent(`${lat},${lng}`);
        const embedUrl = `https://maps.google.com/maps?q=${encodedCoords}&z=16&output=embed`;
        const mapUrl = `https://www.google.com/maps?q=${encodedCoords}`;

        mapFrame.src = embedUrl;
        mapExternalLink.href = mapUrl;
        mapLocationText.textContent =
          label || `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        locationModal.classList.add("show");
      }

      function closeLocationModal() {
        locationModal.classList.remove("show");
        mapFrame.src = "";
      }

      function getSelectedText(groupId) {
        const selected = document.querySelector(`#${groupId} button.active`);
        return selected ? selected.textContent.trim() : "";
      }

      function applyFilters() {
        const searchValue = searchInput.value.trim().toLowerCase();
        const filtered = incidents.filter((incident) => {
          const statusMatch =
            activeFilter === "all" ||
            String(incident.status || "").toLowerCase() === activeFilter;

          if (!statusMatch) {
            return false;
          }

          if (!searchValue) {
            return true;
          }

          const haystack = [
            incident.callerName,
            incident.contact,
            incident.description,
            incident.type,
            inferIncidentLocation(incident),
          ]
            .join(" ")
            .toLowerCase();

          return haystack.includes(searchValue);
        });

        renderIncidents(filtered);
      }

      function renderIncidents(list) {
        incidentContainer.innerHTML = "";

        if (!list.length) {
          incidentContainer.innerHTML =
            '<p style="color:#9fb5a4;">No incidents found.</p>';
          return;
        }

        list.forEach((incident) => {
          const card = document.createElement("div");
          const status = String(incident.status || "active").toLowerCase();
          const contact = incident.contact || "N/A";
          const location = inferIncidentLocation(incident);
          const typeLabel = getIncidentTypeLabel(incident.type);
          const studentId = incident.studentId || incident.schoolId || "N/A";

          card.className = `incident-card ${status}`;
          card.innerHTML = `
            <div class="card-top">
                <div class="user">
                    <i class="fa fa-user"></i>
                    <div>
                        <h3>${escapeHtml(incident.callerName || "Unknown Caller")}</h3>
                        <span>${escapeHtml(formatTimestamp(incident.createdAt))}</span>
                    </div>
                </div>
                <span class="status ${escapeHtml(status)}">${escapeHtml(status.toUpperCase())}</span>
            </div>

            <div class="card-body">
                <div class="location-row">
                    <button class="track-btn" data-lat="${incident.location?.lat || ""}" data-lng="${incident.location?.lng || ""}">
                        <i class="fa-solid fa-location-crosshairs"></i>
                    </button>
                    <span class="location-text" data-location-name>${escapeHtml(location)}</span>
                </div>
                <p><strong>Incident:</strong> ${escapeHtml(typeLabel)}</p>
                <p><strong>Contact:</strong> ${escapeHtml(contact)}</p>
                <p><strong>Student ID:</strong> ${escapeHtml(studentId)}</p>
                <p><strong>Description:</strong> ${escapeHtml(incident.description || "-")}</p>
            </div>

            <div class="card-actions">
                <button class="btn call"><i class="fa fa-phone"></i></button>
                <button class="btn dispatch">Dispatch</button>
                <button class="btn mark-resolved" style="background:#2e793e;color:#fff;">Mark Resolved</button>
                ${status === "resolved" ? '<button class="btn delete-resolved" style="background:#7f1d1d;color:#fff;">Delete</button>' : ""}
            </div>
        `;

          const callBtn = card.querySelector(".btn.call");
          const dispatchBtn = card.querySelector(".btn.dispatch");
          const resolveBtn = card.querySelector(".btn.mark-resolved");
          const deleteBtn = card.querySelector(".btn.delete-resolved");

          callBtn.addEventListener("click", () => openCallTestModal(contact));
          dispatchBtn.addEventListener("click", () => openModal(incident.id));
          dispatchBtn.disabled = status !== "active";
          resolveBtn.addEventListener("click", async () => {
            openActionConfirmModal({
              title: "Confirm Resolution",
              message: "Mark this incident as resolved?",
              confirmText: "Mark Resolved",
              confirmColor: "#2e793e",
              onConfirm: async () => {
                await updateIncidentStatus(incident.id, "resolved");
                await logDispatch({
                  incidentId: incident.id,
                  receiver: "Response Team",
                  status: "Resolved",
                  message: "Incident marked resolved by admin",
                });
              },
            });
          });
          resolveBtn.disabled = status === "resolved";

          if (deleteBtn) {
            deleteBtn.addEventListener("click", async () => {
              openActionConfirmModal({
                title: "Delete Incident",
                message: "Delete this resolved incident permanently?",
                confirmText: "Delete",
                confirmColor: "#7f1d1d",
                onConfirm: async () => {
                  try {
                    await deleteIncident(incident.id);
                  } catch (error) {
                    alert(error?.message || "Unable to delete incident.");
                  }
                },
              });
            });
          }

          card
            .querySelector(".track-btn")
            .addEventListener("click", (event) => {
              const lat = Number(event.currentTarget.dataset.lat);
              const lng = Number(event.currentTarget.dataset.lng);
              openLocationModal(lat, lng, location);
            });

          resolveLocationName(incident).then((resolvedLocationName) => {
            const locationNameNode = card.querySelector("[data-location-name]");
            if (locationNameNode) {
              locationNameNode.textContent = resolvedLocationName;
            }
          });

          incidentContainer.appendChild(card);
        });
      }

      function getHotlineSelection() {
        if (hotlineSelect.value === "custom") {
          return {
            name: customHotlineName.value.trim(),
            phone: customHotlineNumber.value.trim(),
          };
        }

        const selectedOption =
          hotlineSelect.options[hotlineSelect.selectedIndex];
        return {
          name:
            selectedOption?.textContent?.split(" - ")?.[0] || "Response Team",
          phone: selectedOption?.dataset?.phone || "",
        };
      }

      function openPrintReport({ incident, dispatch }) {
        const reportWindow = window.open("", "_blank", "width=920,height=760");
        if (!reportWindow) {
          alert("Please allow popups to print the dispatch report.");
          return;
        }

        const reportHtml = `
          <!doctype html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <title>Dispatch Report - ${escapeHtml(incident.id)}</title>
              <style>
                body { font-family: Arial, sans-serif; padding: 28px; color: #111827; }
                .header { border-bottom: 2px solid #0f5132; margin-bottom: 16px; padding-bottom: 10px; }
                h1 { margin: 0; font-size: 22px; }
                .muted { color: #6b7280; font-size: 12px; }
                .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 18px; margin-top: 14px; }
                .card { border: 1px solid #d1d5db; border-radius: 10px; padding: 12px; }
                .label { font-size: 11px; color: #6b7280; text-transform: uppercase; }
                .value { font-size: 14px; margin-top: 4px; font-weight: 600; }
                .full { grid-column: 1 / -1; }
                @media print { body { padding: 16px; } }
              </style>
            </head>
            <body>
              <div class="header">
                <h1>Incident Dispatch Report</h1>
                <div class="muted">Generated ${new Date().toLocaleString()}</div>
              </div>
              <div class="grid">
                <div class="card"><div class="label">Incident ID</div><div class="value">${escapeHtml(incident.id)}</div></div>
                <div class="card"><div class="label">Status</div><div class="value">Dispatched</div></div>
                <div class="card"><div class="label">Caller</div><div class="value">${escapeHtml(incident.callerName || "Unknown Caller")}</div></div>
                <div class="card"><div class="label">Contact</div><div class="value">${escapeHtml(incident.contact || "N/A")}</div></div>
                <div class="card"><div class="label">Incident Type</div><div class="value">${escapeHtml(getIncidentTypeLabel(incident.type))}</div></div>
                <div class="card"><div class="label">Location</div><div class="value">${escapeHtml(inferIncidentLocation(incident))}</div></div>
                <div class="card"><div class="label">Assigned Unit</div><div class="value">${escapeHtml(dispatch.unit)}</div></div>
                <div class="card"><div class="label">Hotline</div><div class="value">${escapeHtml(dispatch.hotlineName)} ${dispatch.hotlinePhone ? `(${escapeHtml(dispatch.hotlinePhone)})` : ""}</div></div>
                <div class="card"><div class="label">Danger Level</div><div class="value">${escapeHtml(String(dispatch.dangerLevel))}/10</div></div>
                <div class="card full"><div class="label">Description</div><div class="value">${escapeHtml(incident.description || "No description")}</div></div>
                <div class="card full"><div class="label">Dispatch Notes</div><div class="value">${escapeHtml(dispatch.notes || "-")}</div></div>
              </div>
            </body>
          </html>
        `;

        reportWindow.document.open();
        reportWindow.document.write(reportHtml);
        reportWindow.document.close();
        reportWindow.focus();
        reportWindow.print();
      }

      async function dispatchIncident() {
        const incidentId = callerSelect.value || selectedIncidentId;
        const selectedIncident = incidents.find(
          (item) => item.id === incidentId,
        );
        const unit = getSelectedText("unitGroup") || "Police";
        const dangerLevel = document.getElementById("dangerRange").value;
        const notes = document.getElementById("dispatchNotes").value.trim();
        const hotline = getHotlineSelection();

        if (!selectedIncident) {
          alert("Please select an active caller first.");
          return;
        }

        if (!hotline.name) {
          alert("Please select an emergency hotline.");
          return;
        }

        if (hotlineSelect.value === "custom" && !hotline.phone) {
          alert("Please enter a custom hotline number.");
          return;
        }

        await updateIncidentStatus(selectedIncident.id, "dispatched");

        await logDispatch({
          incidentId: selectedIncident.id,
          receiver: `${unit} - ${hotline.name}`,
          status: "Delivered",
          message: `Unit dispatched for ${getIncidentTypeLabel(selectedIncident.type)} at ${inferIncidentLocation(selectedIncident)}${notes ? ` | Notes: ${notes}` : ""}`,
        });

        openPrintReport({
          incident: selectedIncident,
          dispatch: {
            unit,
            hotlineName: hotline.name,
            hotlinePhone: hotline.phone,
            dangerLevel,
            notes,
          },
        });

        closeModal();
      }

      function setupSelectableButtonGroup(groupId) {
        const group = document.getElementById(groupId);
        if (!group) {
          return;
        }

        const buttons = group.querySelectorAll("button");
        buttons.forEach((button) => {
          button.addEventListener("click", () => {
            buttons.forEach((btn) => btn.classList.remove("active"));
            button.classList.add("active");
          });
        });
      }

      selectedFilter.addEventListener("click", () =>
        selectRoot.classList.toggle("active"),
      );
      filterOptions.forEach((option) => {
        option.addEventListener("click", () => {
          activeFilter = option.dataset.value || "all";
          selectedFilter.textContent = option.textContent;
          selectRoot.classList.remove("active");
          applyFilters();
        });
      });

      searchInput.addEventListener("input", applyFilters);
      callerSelect.addEventListener("change", (event) => {
        populateModalFromIncident(event.target.value);
      });
      hotlineSelect.addEventListener("change", () => {
        const isCustom = hotlineSelect.value === "custom";
        customHotlineFields.classList.toggle("hidden", !isCustom);
      });

      document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.key.toLowerCase() === "a") {
          e.preventDefault();
          if (!modal.classList.contains("show")) {
            openModal();
          }
        }

        if (e.key === "Escape" && modal.classList.contains("show")) {
          closeModal();
        }

        if (e.key === "Escape" && locationModal.classList.contains("show")) {
          closeLocationModal();
        }

        if (
          e.key === "Escape" &&
          actionConfirmModal.classList.contains("show")
        ) {
          closeActionConfirmModal();
        }

        if (!modal.classList.contains("show")) {
          return;
        }

        const active = document.activeElement;
        if (
          e.key === "Enter" &&
          (active.tagName === "INPUT" ||
            active.tagName === "SELECT" ||
            active.tagName === "TEXTAREA")
        ) {
          e.preventDefault();
          dispatchIncident();
        }
      });

      modal.addEventListener("click", (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      locationModal.addEventListener("click", (e) => {
        if (e.target === locationModal) {
          closeLocationModal();
        }
      });

      actionConfirmClose.addEventListener("click", closeActionConfirmModal);
      actionConfirmCancel.addEventListener("click", closeActionConfirmModal);
      actionConfirmOk.addEventListener("click", async () => {
        const handler = onActionConfirm;
        closeActionConfirmModal();
        if (handler) {
          await handler();
        }
      });
      actionConfirmModal.addEventListener("click", (e) => {
        if (e.target === actionConfirmModal) {
          closeActionConfirmModal();
        }
      });

      document
        .getElementById("dangerRange")
        .addEventListener("input", function () {
          document.getElementById("dangerValue").textContent = this.value;
          this.title = `Danger level: ${this.value}`;
        });

      window.openModal = openModal;
      window.closeModal = closeModal;
      window.openLocationModal = openLocationModal;
      window.closeLocationModal = closeLocationModal;
      window.dispatchIncident = dispatchIncident;

      setupSelectableButtonGroup("unitGroup");
      window.addEventListener(
        "load",
        () => {
          assetsReady = true;
          tryShowPage();
        },
        { once: true },
      );

      await requireAdminSession({ autoRedirect: true });
      subscribeIncidents((liveIncidents) => {
        incidents = liveIncidents;
        applyFilters();
        incidentsReady = true;
        tryShowPage();
      });
      subscribeHotlines((liveHotlines) => {
        hotlines = liveHotlines;
        renderHotlineOptions();
        hotlinesReady = true;
        tryShowPage();
      });
    </script>
  </body>
</html>
