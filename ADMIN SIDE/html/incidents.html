<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Incidents</title>

<link rel="stylesheet" href="../css/incidents.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="header">
    <h2>Incident Reports</h2>
</div>

<!-- CONTROLS -->
<div class="controls">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search...">
        <i class="fa fa-search"></i>
    </div>

    <div class="custom-select" id="customSelect">
        <div class="select-selected">All</div>
        <div class="select-items">
            <div data-value="all">All</div>
            <div data-value="active">Active</div>
            <div data-value="resolved">Resolved</div>
        </div>
    </div>

    <button class="add-btn" onclick="openModal()">
        <i class="fa fa-plus"></i>
    </button>

</div>

<!-- INCIDENT GRID -->
<div class="incidents-grid" id="incidentContainer"></div>

<!-- MODAL -->
<div class="modal" id="incidentModal">

  <div class="modal-content emergency dispatch-ui">

    <!-- HEADER -->
    <div class="modal-header">
      <h3>Sending Units</h3>
      <span class="close" onclick="closeModal()">&times;</span>
    </div>

    <div class="modal-body">

      <!-- CALLER -->
      <label for="name">Caller Information</label>
      <input type="text" id="name" placeholder="Caller Name">
           <!-- CONTACT -->
      <input type="text" id="contact" placeholder="Contact Number">

      <!-- UNIT -->
      <label>Which unit to send?</label>
      <div class="btn-group" id="unitGroup">
        <button class="active">Police</button>
        <button>Fire</button>
        <button>Rescue</button>
      </div>

      <!-- TYPE -->
      <label>Type of incident</label>
      <select id="incident">
        <option value="Fire">Fire</option>
        <option value="Medical">Medical</option>
        <option value="Accident">Accident</option>
        <option value="Security">Security</option>
      </select>

      <!-- PROBLEM -->
      <label>What is the problem?</label>
      <input type="text" id="type" placeholder="Describe incident...">

      <hr>

      <!-- LOCATION -->
      <div class="location-input">
        <button type="button" class="track-btn" onclick="trackCurrentLocation()">
          <i class="fa-solid fa-location-crosshairs"></i>
        </button>
        <input type="text" id="location" placeholder="Specific Location">
      </div>

      <!-- VICTIMS -->
      <label>How many victims?</label>
      <div class="btn-group small" id="victimGroup">
        <button>No one</button>
        <button class="active">1-4</button>
        <button>5-9</button>
        <button>Over 10</button>
      </div>

      <!-- AGGRESSORS -->
      <label>How many aggressors?</label>
      <div class="btn-group small" id="aggressorGroup">
        <button>Single</button>
        <button class="active">2-4</button>
        <button>5-9</button>
        <button>Over 10</button>
      </div>

      <!-- DANGER -->
      <label for="dangerRange">Rate the danger level</label>
      <input type="range" id="dangerRange" class="range" min="1" max="10" value="5" title="Danger level: 5">
      <div class="range-value">Danger level: <span id="dangerValue">5</span>/10</div>


      <!-- STATUS -->
      <select id="status">
        <option value="active">Active</option>
        <option value="resolved">Resolved</option>
      </select>

    </div>

    <!-- FOOTER -->
    <div class="modal-footer">
      <button class="save-btn" onclick="addIncident()">
        SEND UNITS
      </button>
    </div>

  </div>

</div>
<script>
/* =========================
   📞 CALL
========================= */
function callUser(number) {
    window.location.href = "tel:" + number;
}

/* =========================
   🧠 MODAL CONTROL
========================= */
const modal = document.getElementById("incidentModal");

function openModal() {
    modal.classList.add("show");

    setTimeout(() => {
        document.getElementById("name").focus();
    }, 100);
}

function closeModal() {
    modal.classList.remove("show");
}

/* =========================
   ⌨️ SHORTCUTS (FINAL FIX)
========================= */

// CTRL + A → OPEN MODAL
document.addEventListener("keydown", function(e) {

    if (e.ctrlKey && e.key.toLowerCase() === "a") {
        e.preventDefault();

        if (!modal.classList.contains("show")) {
            openModal();
        }
    }

});

// ENTER → SAVE (ONLY INSIDE MODAL INPUTS)
document.addEventListener("keydown", function(e) {

    if (!modal.classList.contains("show")) return;

    const active = document.activeElement;

    if (
        e.key === "Enter" &&
        (active.tagName === "INPUT" || active.tagName === "SELECT")
    ) {
        e.preventDefault();
        addIncident();
    }

});

// ESC → CLOSE MODAL
document.addEventListener("keydown", function(e) {

    if (e.key === "Escape" && modal.classList.contains("show")) {
        closeModal();
    }

});

/* =========================
   🖱 CLICK OUTSIDE TO CLOSE
========================= */
modal.addEventListener("click", function(e) {
    if (e.target === modal) {
        closeModal();
    }
});

/* =========================
   ⚡ QUICK TYPE BUTTONS
========================= */
function setType(value) {
    document.getElementById("type").value = value;
}

/* =========================
   🧱 CREATE CARD
========================= */
function createCard(data) {

    const container = document.getElementById("incidentContainer");

    const card = document.createElement("div");
    card.className = `incident-card ${data.status}`;

    card.innerHTML = `
    <div class="card-top">
        <div class="user">
            <i class="fa fa-user"></i>
            <div>
                <h3>${data.name}</h3>
                <span>Caller</span>
            </div>
        </div>
        <span class="status ${data.status}">
            ${data.status.toUpperCase()}
        </span>
    </div>

    <div class="card-body">

        <!-- 📍 LOCATION WITH TRACK BUTTON -->
        <div class="location-row">
            <button class="track-btn" onclick="trackLocation('${data.location}')">
                <i class="fa-solid fa-location-crosshairs"></i>
            </button>

            <span class="location-text">${data.location}</span>
        </div>

        <p><strong>Incident:</strong> ${data.type}</p>
        <p><strong>Contact:</strong> ${data.contact}</p>
    </div>

    <div class="card-actions">
        <button class="btn call" onclick="callUser('${data.contact}')">
            <i class="fa fa-phone"></i>
        </button>
    </div>
`;

    container.prepend(card);
}

/* =========================
   ➕ ADD INCIDENT
========================= */
function addIncident() {

    const name = document.getElementById("name").value.trim();
    const location = document.getElementById("location").value.trim();
    const type = document.getElementById("type").value.trim();
    const contact = document.getElementById("contact").value.trim();
    const status = document.getElementById("status").value;

    if (!name || !location || !type || !contact) {
        alert("Fill required fields");
        return;
    }

    createCard({ name, location, type, contact, status });

    closeModal();

    // 📞 AUTO CALL
    callUser(contact);

    // clear fields
    document.getElementById("name").value = "";
    document.getElementById("location").value = "";
    document.getElementById("type").value = "";
    document.getElementById("contact").value = "";
}

/* =========================
   📊 SAMPLE DATA LOAD
========================= */
window.addEventListener("load", () => {

    const samples = [
        {
            name: "Juan Dela Cruz",
            location: "Room 101",
            type: "Fire Emergency",
            contact: "09123456789",
            status: "active"
        },
        {
            name: "Maria Santos",
            location: "Clinic",
            type: "Medical Emergency",
            contact: "09987654321",
            status: "resolved"
        }
    ];

    samples.forEach(createCard);
});

function trackLocation(location) {
    console.log("Tracking location:", location);

    // ready for map integration
    // example (iframe/map communication)
    window.parent.postMessage({
        type: "TRACK_LOCATION",
        location: location
    }, "*");
}

function trackCurrentLocation() {
    const locationInput = document.getElementById("location");

    if (!navigator.geolocation) {
        alert("Geolocation is not supported by this browser.");
        return;
    }

    navigator.geolocation.getCurrentPosition(
        (position) => {
            const { latitude, longitude } = position.coords;
            locationInput.value = `${latitude.toFixed(6)}, ${longitude.toFixed(6)}`;
        },
        () => {
            alert("Unable to get current location.");
        }
    );
}

function setupSelectableButtonGroup(groupId) {
    const group = document.getElementById(groupId);
    if (!group) return;

    const buttons = group.querySelectorAll("button");
    buttons.forEach((button) => {
        button.addEventListener("click", () => {
            buttons.forEach((btn) => btn.classList.remove("active"));
            button.classList.add("active");
        });
    });
}

setupSelectableButtonGroup("unitGroup");
setupSelectableButtonGroup("victimGroup");
setupSelectableButtonGroup("aggressorGroup");

const dangerRange = document.getElementById("dangerRange");
const dangerValue = document.getElementById("dangerValue");

if (dangerRange && dangerValue) {
    dangerRange.addEventListener("input", function() {
        dangerValue.textContent = this.value;
        this.title = `Danger level: ${this.value}`;
    });
}

</script>

</body>
</html>
