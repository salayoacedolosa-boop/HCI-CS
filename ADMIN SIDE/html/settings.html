<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>

    <link rel="stylesheet" href="../css/settings.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="header">
      <h2>System Settings</h2>
    </div>

    <div class="settings-grid">
      <!-- PROFILE -->
      <div class="settings-card">
        <h3>Admin Profile</h3>

        <label>Full Name</label>
        <input type="text" id="fullName" value="Admin User" title="Full Name" />

        <label>Email</label>
        <input
          type="email"
          id="adminEmail"
          value="admin@plp.edu.ph"
          title="Email"
        />

        <button class="save-btn" id="saveProfileBtn">Save Changes</button>
      </div>

      <!-- SYSTEM -->
      <div class="settings-card">
        <h3>System Preferences</h3>

        <label>Default Map Mode</label>
        <select title="Default Map Mode">
          <option>Satellite</option>
          <option selected>Dark Mode</option>
          <option>Standard</option>
        </select>

        <label>Notification Sound</label>
        <select title="Notification Sound">
          <option>Enabled</option>
          <option>Disabled</option>
        </select>

        <button class="save-btn" id="savePrefsBtn">Apply</button>
      </div>

      <!-- SECURITY -->
      <div class="settings-card">
        <h3>Security</h3>

        <label>Change Password</label>
        <div class="password-field">
          <input type="password" id="password" placeholder="New Password" />
          <i class="fa fa-eye toggle-password" data-target="password"></i>
        </div>

        <label>Confirm Password</label>
        <div class="password-field">
          <input
            type="password"
            id="confirmPassword"
            placeholder="Confirm Password"
          />
          <i
            class="fa fa-eye toggle-password"
            data-target="confirmPassword"
          ></i>
        </div>

        <button class="save-btn" id="updatePasswordBtn">Update Password</button>
      </div>

      <!-- SYSTEM STATUS -->
      <div class="settings-card status-card">
        <h3>System Status</h3>

        <div class="status-item">
          <span>Database</span>
          <span class="badge danger" id="dbStatusBadge">Offline</span>
        </div>

        <div class="status-item">
          <span>Map Service</span>
          <span class="badge danger" id="mapStatusBadge">Offline</span>
        </div>

        <div class="status-item">
          <span>Emergency API</span>
          <span class="badge danger" id="apiStatusBadge">Offline</span>
        </div>
      </div>

      <!-- SHORTCUT KEYS (FIXED + EDITABLE) -->
      <div class="settings-card">
        <h3><i class="fa fa-keyboard"></i> Shortcut Keys</h3>

        <div class="shortcut-item">
          <span>Add Incident</span>
          <input
            class="key-input"
            data-action="add"
            readonly
            title="Add Incident Shortcut"
          />
        </div>

        <div class="shortcut-item">
          <span>Save Incident</span>
          <input
            class="key-input"
            data-action="save"
            readonly
            title="Save Incident Shortcut"
          />
        </div>

        <div class="shortcut-item">
          <span>Track Location</span>
          <input
            class="key-input"
            data-action="track"
            readonly
            title="Track Location Shortcut"
          />
        </div>

        <div class="shortcut-item">
          <span>Close / Exit</span>
          <input
            class="key-input"
            data-action="close"
            readonly
            title="Close Shortcut"
          />
        </div>

        <button class="save-btn">Save Changes</button>
      </div>
    </div>

    <!-- 🔥 SHORTCUT EDIT SCRIPT -->
    <script type="module">
      import {
        getSystemStatus,
        requireAdminSession,
        updateAdminPassword,
        updateAdminProfile,
      } from "../api/firebase_admin.js";

      /* DEFAULT SHORTCUTS */
      let shortcuts = JSON.parse(localStorage.getItem("shortcuts")) || {
        add: "Ctrl + A",
        save: "Enter",
        track: "Ctrl + L",
        close: "Escape",
      };

      /* LOAD VALUES */
      document.querySelectorAll(".key-input").forEach((input) => {
        input.value = shortcuts[input.dataset.action];
      });

      /* CAPTURE NEW SHORTCUT */
      document.querySelectorAll(".key-input").forEach((input) => {
        input.addEventListener("focus", () => {
          input.value = "Press key...";
        });

        input.addEventListener("keydown", (e) => {
          e.preventDefault();

          let keys = [];

          if (e.ctrlKey) keys.push("Ctrl");
          if (e.shiftKey) keys.push("Shift");
          if (e.altKey) keys.push("Alt");

          if (!["Control", "Shift", "Alt"].includes(e.key)) {
            keys.push(e.key.length === 1 ? e.key.toUpperCase() : e.key);
          }

          const combo = keys.join(" + ");

          input.value = combo;
          shortcuts[input.dataset.action] = combo;

          localStorage.setItem("shortcuts", JSON.stringify(shortcuts));

          alert("Shortcut updated: " + combo); // 🔥 alert added

          input.blur();
        });
      });

      /* SHOW / HIDE PASSWORD */
      document.querySelectorAll(".toggle-password").forEach((icon) => {
        icon.addEventListener("click", () => {
          const input = document.getElementById(icon.dataset.target);

          if (input.type === "password") {
            input.type = "text";
            icon.classList.remove("fa-eye");
            icon.classList.add("fa-eye-slash");
          } else {
            input.type = "password";
            icon.classList.remove("fa-eye-slash");
            icon.classList.add("fa-eye");
          }
        });
      });

      function applyBadgeState(element, status) {
        const online = String(status || "").toLowerCase() === "online";
        element.textContent = online ? "Online" : "Offline";
        element.classList.remove("danger", "ok");
        element.classList.add(online ? "ok" : "danger");
      }

      const { profile } = await requireAdminSession({ autoRedirect: true });

      const fullNameInput = document.getElementById("fullName");
      const adminEmailInput = document.getElementById("adminEmail");
      fullNameInput.value =
        profile.displayName || profile.username || "Admin User";
      adminEmailInput.value = profile.email || "";
      adminEmailInput.readOnly = true;

      document
        .getElementById("saveProfileBtn")
        .addEventListener("click", async () => {
          const displayName = fullNameInput.value.trim();

          if (!displayName) {
            alert("Full name is required.");
            return;
          }

          try {
            await updateAdminProfile({
              displayName,
              username: profile.username || "admin",
              usernameLower: String(profile.username || "admin").toLowerCase(),
              email: profile.email || adminEmailInput.value,
              role: profile.role || "admin",
              isActive: true,
            });
            alert("Profile updated.");
          } catch (error) {
            alert(error.message || "Failed to update profile.");
          }
        });

      document.getElementById("savePrefsBtn").addEventListener("click", () => {
        alert("Preferences applied.");
      });

      document
        .getElementById("updatePasswordBtn")
        .addEventListener("click", async () => {
          const password = document.getElementById("password").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;

          if (!password || !confirmPassword) {
            alert("Please complete both password fields.");
            return;
          }

          if (password.length < 6) {
            alert("Password must be at least 6 characters.");
            return;
          }

          if (password !== confirmPassword) {
            alert("Passwords do not match.");
            return;
          }

          try {
            await updateAdminPassword(password);
            alert("Password updated.");
            document.getElementById("password").value = "";
            document.getElementById("confirmPassword").value = "";
          } catch (error) {
            alert(error.message || "Unable to update password.");
          }
        });

      try {
        const status = await getSystemStatus();
        applyBadgeState(
          document.getElementById("dbStatusBadge"),
          status.database,
        );
        applyBadgeState(
          document.getElementById("mapStatusBadge"),
          status.mapService,
        );
        applyBadgeState(
          document.getElementById("apiStatusBadge"),
          status.emergencyApi,
        );
      } catch {
        applyBadgeState(document.getElementById("dbStatusBadge"), "offline");
        applyBadgeState(document.getElementById("mapStatusBadge"), "offline");
        applyBadgeState(document.getElementById("apiStatusBadge"), "offline");
      }
    </script>
  </body>
</html>
