<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Command Map</title>

    <link rel="stylesheet" href="../css/map.css" />
    <link rel="stylesheet" href="../css/page-loader.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
  </head>

  <body>
    <div id="pageLoader" class="page-loader" aria-live="polite">
      <div class="page-loader-spinner"></div>
      <div class="page-loader-text">Loading map...</div>
    </div>
    <!-- MAP -->
    <div id="map"></div>
    <div class="map-toolbar">
      <button type="button" class="add-marker-btn" id="openMarkerModalBtn">
        <i class="fa-solid fa-map-pin"></i> Add Marker
      </button>
      <button type="button" class="sound-enable-btn" id="enableSoundBtn">
        <i class="fa-solid fa-volume-high"></i> Enable Sound
      </button>
    </div>
    <div id="debugBadge" class="debug-badge">Missing coords: 0</div>
    <div class="notification-panel" id="notificationPanel" aria-live="polite">
      <div class="notification-panel-header">
        <div>
          <h4>
            New incidents
            <span class="notification-badge" id="notificationBadge">0</span>
          </h4>
        </div>
        <div class="panel-actions">
          <button type="button" id="clearNotificationsBtn">Clear</button>
        </div>
      </div>
      <div class="notification-list" id="notificationList">
        <div style="color:#94a3b8;font-size:12px;padding:8px 6px;">
          No new incidents.
        </div>
      </div>
    </div>
    <div class="toast-stack" id="toastStack" aria-live="polite"></div>
    <div id="incidentModal" class="incident-modal hidden" aria-hidden="true">
      <div class="incident-modal-backdrop"></div>
      <div class="incident-modal-card" role="dialog" aria-modal="true">
        <div class="incident-modal-header">
          <h3>Active Incident Details</h3>
          <button type="button" class="modal-close-btn" id="closeIncidentModal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="incident-modal-body">
          <div class="detail-row">
            <span>Caller</span><strong id="detailCaller">-</strong>
          </div>
          <div class="detail-row">
            <span>Contact</span><strong id="detailContact">-</strong>
          </div>
          <div class="detail-row">
            <span>Incident Type</span><strong id="detailType">-</strong>
          </div>
          <div class="detail-row">
            <span>Status</span><strong id="detailStatus">-</strong>
          </div>
          <div class="detail-row">
            <span>Location</span><strong id="detailLocation">-</strong>
          </div>
          <div class="detail-row full">
            <span>Description</span><strong id="detailDescription">-</strong>
          </div>
        </div>
        <div class="incident-modal-actions">
          <button type="button" class="secondary-btn" id="dismissIncidentModal">
            Close
          </button>
          <button type="button" class="primary-btn" id="manageIncidentBtn">
            Manage in Incidents
          </button>
        </div>
      </div>
    </div>

    <div id="markerModal" class="incident-modal hidden" aria-hidden="true">
      <div class="incident-modal-backdrop"></div>
      <div class="incident-modal-card" role="dialog" aria-modal="true">
        <div class="incident-modal-header">
          <h3>Add Custom Marker</h3>
          <button type="button" class="modal-close-btn" id="closeMarkerModalBtn">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="marker-modal-body">
          <input id="markerNameInput" type="text" placeholder="Marker name" />
          <select id="markerTypeSelect" title="Marker type">
            <option value="hospital">Hospital</option>
            <option value="fire-station">Fire Station</option>
            <option value="police-station">Police Station</option>
            <option value="evacuation-site">Evacuation Site</option>
            <option value="custom">Custom</option>
          </select>
          <select id="markerIconSelect" title="Marker icon">
            <option value="fa-hospital">Hospital</option>
            <option value="fa-fire-extinguisher">Fire</option>
            <option value="fa-shield-halved">Police</option>
            <option value="fa-house">Evacuation</option>
            <option value="fa-location-dot">Pin</option>
          </select>
          <input id="markerColorInput" type="color" value="#2563eb" />
          <p class="hint">After saving, click anywhere on the map to place it.</p>
        </div>
        <div class="incident-modal-actions">
          <button type="button" class="secondary-btn" id="cancelMarkerBtn">
            Cancel
          </button>
          <button type="button" class="primary-btn" id="saveMarkerBtn">
            Save & Place
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        addMapMarker,
        requireAdminSession,
        subscribeActiveIncidents,
        subscribeMapMarkers,
      } from "../api/firebase_admin.js";

      let map;
      let markerRegistry = new Map();
      let incidentRegistry = new Map();
      let edgeIndicatorRegistry = new Map();
      let customMarkerRegistry = new Map();
      let edgeLayer;
      const debugBadge = document.getElementById("debugBadge");
      const notificationBadge = document.getElementById("notificationBadge");
      const notificationList = document.getElementById("notificationList");
      const clearNotificationsBtn = document.getElementById(
        "clearNotificationsBtn",
      );
      const toastStack = document.getElementById("toastStack");
      const incidentModal = document.getElementById("incidentModal");
      const closeIncidentModalBtn =
        document.getElementById("closeIncidentModal");
      const dismissIncidentModalBtn = document.getElementById(
        "dismissIncidentModal",
      );
      const manageIncidentBtn = document.getElementById("manageIncidentBtn");
      const detailCaller = document.getElementById("detailCaller");
      const detailContact = document.getElementById("detailContact");
      const detailType = document.getElementById("detailType");
      const detailStatus = document.getElementById("detailStatus");
      const detailLocation = document.getElementById("detailLocation");
      const detailDescription = document.getElementById("detailDescription");
      const enableSoundBtn = document.getElementById("enableSoundBtn");
      const openMarkerModalBtn = document.getElementById("openMarkerModalBtn");
      const markerModal = document.getElementById("markerModal");
      const closeMarkerModalBtn = document.getElementById("closeMarkerModalBtn");
      const cancelMarkerBtn = document.getElementById("cancelMarkerBtn");
      const saveMarkerBtn = document.getElementById("saveMarkerBtn");
      const markerNameInput = document.getElementById("markerNameInput");
      const markerTypeSelect = document.getElementById("markerTypeSelect");
      const markerIconSelect = document.getElementById("markerIconSelect");
      const markerColorInput = document.getElementById("markerColorInput");
      const pageLoader = document.getElementById("pageLoader");
      const notifAudio = new Audio("../sounds/notif_alert.mp3");
      const sosLoopAudio = new Audio("../sounds/sos_alert.mp3");
      notifAudio.preload = "auto";
      sosLoopAudio.preload = "auto";
      sosLoopAudio.loop = true;
      let audioUnlocked = false;
      let hasAutoFocused = false;
      let selectedIncidentForManage = null;
      let assetsReady = true;
      let mapReady = false;
      let incidentsReady = false;
      let loaderHidden = false;
      let hasProcessedInitialIncidentSnapshot = false;
      const knownIncidentIds = new Set();
      let pendingCustomMarker = null;
      const unseenIncidents = new Map();

      function hidePageLoader() {
        if (loaderHidden) {
          return;
        }
        loaderHidden = true;
        document.body.classList.add("page-ready");
        pageLoader?.classList.add("hide");
        setTimeout(() => pageLoader?.remove(), 250);
      }

      function tryShowPage() {
        if (assetsReady && mapReady && incidentsReady) {
          hidePageLoader();
        }
      }

      function getIncidentVisual(type) {
        const normalized = String(type || "").toLowerCase().trim();
        if (normalized === "sos") {
          return {
            icon: "fa-triangle-exclamation",
            color: "#ef4444",
            className: "type-sos",
            pulse: true,
          };
        }
        if (normalized === "fire") {
          return {
            icon: "fa-fire-flame-curved",
            color: "#f97316",
            className: "type-fire",
            pulse: false,
          };
        }
        if (normalized === "medical") {
          return {
            icon: "fa-briefcase-medical",
            color: "#dc2626",
            className: "type-medical",
            pulse: false,
          };
        }
        if (normalized === "accident") {
          return {
            icon: "fa-car-burst",
            color: "#eab308",
            className: "type-accident",
            pulse: false,
          };
        }
        if (normalized === "injury") {
          return {
            icon: "fa-user-injured",
            color: "#be123c",
            className: "type-injury",
            pulse: false,
          };
        }
        if (normalized === "crime" || normalized === "security") {
          return {
            icon: "fa-user-shield",
            color: "#2563eb",
            className: "type-crime",
            pulse: false,
          };
        }
        return {
          icon: "fa-triangle-exclamation",
          color: "#64748b",
          className: "type-generic",
          pulse: false,
        };
      }

      function createIncidentIcon(type) {
        const visual = getIncidentVisual(type);
        return L.divIcon({
          className: `incident-alert-marker ${visual.className} ${visual.pulse ? "has-pulse" : ""}`,
          html: `<span class="pulse-ring"></span><span class="marker-core"><i class="fa-solid ${visual.icon}"></i></span>`,
          iconSize: [42, 42],
          iconAnchor: [21, 21],
        });
      }

      function getIncidentCoordinates(incident) {
        const location = incident?.location || {};
        const latCandidate =
          location.lat ??
          location.latitude ??
          location._lat ??
          incident?.lat ??
          incident?.latitude;
        const lngCandidate =
          location.lng ??
          location.lon ??
          location.long ??
          location.longitude ??
          location._long ??
          incident?.lng ??
          incident?.longitude;

        const lat =
          typeof latCandidate === "number"
            ? latCandidate
            : Number(String(latCandidate || "").trim());
        const lng =
          typeof lngCandidate === "number"
            ? lngCandidate
            : Number(String(lngCandidate || "").trim());

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return null;
        }

        return { lat, lng };
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getLocationLabel(incident, coordinates) {
        if (incident?.location?.label) {
          return incident.location.label;
        }

        if (!coordinates) {
          return "Unknown";
        }

        return `${coordinates.lat.toFixed(6)}, ${coordinates.lng.toFixed(6)}`;
      }

      function openIncidentModal(incident) {
        const coordinates = getIncidentCoordinates(incident);
        selectedIncidentForManage = incident;
        stopSosLoopAlert();
        markIncidentSeen(incident?.id);

        detailCaller.textContent = incident.callerName || "Unknown Caller";
        detailContact.textContent = incident.contact || "N/A";
        detailType.textContent = incident.type || "Incident";
        detailStatus.textContent = String(
          incident.status || "active",
        ).toUpperCase();
        detailLocation.textContent = getLocationLabel(incident, coordinates);
        detailDescription.textContent =
          incident.description || "No description provided.";

        incidentModal.classList.remove("hidden");
        incidentModal.setAttribute("aria-hidden", "false");
      }

      function closeIncidentModal() {
        incidentModal.classList.add("hidden");
        incidentModal.setAttribute("aria-hidden", "true");
      }

      function renderUnseenPanel() {
        const entries = Array.from(unseenIncidents.values());
        notificationBadge.textContent = String(entries.length);

        if (!entries.length) {
          notificationList.innerHTML =
            '<div style="color:#94a3b8;font-size:12px;padding:8px 6px;">No new incidents.</div>';
          return;
        }

        notificationList.innerHTML = "";
        entries
          .sort((a, b) => (b.createdAtMs || 0) - (a.createdAtMs || 0))
          .forEach((entry) => {
            const visual = getIncidentVisual(entry.type);
            const row = document.createElement("div");
            row.className = "notification-item";
            row.innerHTML = `
              <div class="notif-icon" style="background:${escapeHtml(visual.color)};">
                <i class="fa-solid ${escapeHtml(visual.icon)}"></i>
              </div>
              <div class="notif-main">
                <strong>${escapeHtml(String(entry.type || "Incident").toUpperCase())} - ${escapeHtml(entry.callerName || "Unknown Caller")}</strong>
                <span>${escapeHtml(entry.locationLabel || "Unknown location")}</span>
              </div>
              <button type="button" class="notif-view">View</button>
            `;

            row.querySelector(".notif-view").addEventListener("click", () => {
              const incident = entry.incident;
              if (!incident) {
                return;
              }
              const coords = getIncidentCoordinates(incident);
              if (coords) {
                map.panTo([coords.lat, coords.lng], { animate: true });
              }
              openIncidentModal(incident);
            });
            notificationList.appendChild(row);
          });
      }

      function markIncidentSeen(incidentId) {
        if (!incidentId) {
          return;
        }
        if (unseenIncidents.has(incidentId)) {
          unseenIncidents.delete(incidentId);
          renderUnseenPanel();
        }
      }

      function showToastForIncident(incident) {
        if (!toastStack) {
          return;
        }
        const visual = getIncidentVisual(incident.type);
        const toast = document.createElement("div");
        toast.className = "toast";
        const coords = getIncidentCoordinates(incident);
        const locationLabel = getLocationLabel(incident, coords);
        toast.innerHTML = `
          <div class="toast-icon" style="background:${escapeHtml(visual.color)};">
            <i class="fa-solid ${escapeHtml(visual.icon)}"></i>
          </div>
          <div class="toast-body">
            <p class="toast-title">${escapeHtml(String(incident.type || "Incident").toUpperCase())} reported</p>
            <p class="toast-subtitle">${escapeHtml(incident.callerName || "Unknown Caller")} • ${escapeHtml(locationLabel)}</p>
          </div>
          <div class="toast-actions">
            <button type="button" class="toast-view">View</button>
          </div>
        `;
        toast.querySelector(".toast-view").addEventListener("click", () => {
          const coords = getIncidentCoordinates(incident);
          if (coords) {
            map.panTo([coords.lat, coords.lng], { animate: true });
          }
          openIncidentModal(incident);
          toast.remove();
        });
        toastStack.appendChild(toast);
        setTimeout(() => toast.remove(), 6500);
      }

      function playNotificationAlert() {
        notifAudio.currentTime = 0;
        notifAudio.play().catch(() => {
          enableSoundBtn?.classList.add("is-visible");
        });
      }

      function playSosLoopAlert() {
        sosLoopAudio.currentTime = 0;
        sosLoopAudio.play().catch(() => {
          enableSoundBtn?.classList.add("is-visible");
        });
      }

      function stopSosLoopAlert() {
        if (!sosLoopAudio.paused) {
          sosLoopAudio.pause();
          sosLoopAudio.currentTime = 0;
        }
      }

      function setupSosAcknowledgeHooks() {
        const acknowledge = () => {
          stopSosLoopAlert();
          unlockAudio().catch(() => {});
        };
        ["click", "keydown", "touchstart"].forEach((eventName) => {
          document.addEventListener(eventName, acknowledge, true);
        });
      }

      async function unlockAudio() {
        if (audioUnlocked) {
          return true;
        }
        try {
          const previousNotifVolume = notifAudio.volume;
          notifAudio.volume = 0;
          await notifAudio.play();
          notifAudio.pause();
          notifAudio.currentTime = 0;
          notifAudio.volume = previousNotifVolume;
          audioUnlocked = true;
          enableSoundBtn?.classList.remove("is-visible");
          return true;
        } catch (error) {
          enableSoundBtn?.classList.add("is-visible");
          throw error;
        }
      }

      function handleNewIncidentAlerts(snapshotIncidents) {
        const snapshotIds = new Set(snapshotIncidents.map((incident) => incident.id));

        if (!hasProcessedInitialIncidentSnapshot) {
          snapshotIds.forEach((id) => knownIncidentIds.add(id));
          hasProcessedInitialIncidentSnapshot = true;
          return;
        }

        let hasNewSos = false;
        let hasNewNonSos = false;

        snapshotIncidents.forEach((incident) => {
          if (knownIncidentIds.has(incident.id)) {
            return;
          }

          const type = String(incident.type || "").toLowerCase();
          if (type === "sos") {
            hasNewSos = true;
          } else {
            hasNewNonSos = true;
          }
          knownIncidentIds.add(incident.id);

          const coords = getIncidentCoordinates(incident);
          const locationLabel = getLocationLabel(incident, coords);
          const createdAtMs =
            typeof incident?.createdAt?.toDate === "function"
              ? incident.createdAt.toDate().getTime()
              : Date.now();
          unseenIncidents.set(incident.id, {
            id: incident.id,
            type: incident.type,
            callerName: incident.callerName || "Unknown Caller",
            locationLabel,
            createdAtMs,
            incident,
          });
          renderUnseenPanel();
          showToastForIncident(incident);
        });

        Array.from(knownIncidentIds).forEach((id) => {
          if (!snapshotIds.has(id)) {
            knownIncidentIds.delete(id);
          }
        });

        if (hasNewSos) {
          playSosLoopAlert();
        } else if (hasNewNonSos) {
          playNotificationAlert();
        }
      }

      function transferToIncidentsPage(incidentId) {
        const route = "incidents.html";
        try {
          sessionStorage.setItem("focusIncidentId", incidentId || "");
        } catch {
          // Ignore storage failures.
        }

        try {
          if (window.parent && typeof window.parent.loadPage === "function") {
            const menuItem = window.parent.document.querySelector(
              '.sidebar li[onclick*="incidents.html"]',
            );
            if (menuItem) {
              window.parent.loadPage(route, menuItem);
              return;
            }
          }
        } catch {
          // Fall back to direct frame navigation.
        }

        try {
          const frame = window.parent?.document?.getElementById("contentFrame");
          if (frame) {
            frame.src = route;
            return;
          }
        } catch {
          // Fall through to local navigation.
        }

        window.location.href = route;
      }

      function addOrUpdateMarker(incident) {
        const coordinates = getIncidentCoordinates(incident);
        if (!coordinates) {
          return;
        }

        incidentRegistry.set(incident.id, {
          incident,
          coordinates,
        });

        if (markerRegistry.has(incident.id)) {
          const existing = markerRegistry.get(incident.id);
          existing.iconMarker.setLatLng([coordinates.lat, coordinates.lng]);
          existing.iconMarker.setIcon(createIncidentIcon(incident.type));
          existing.iconMarker.setZIndexOffset(1000);
          existing.haloMarker.setLatLng([coordinates.lat, coordinates.lng]);
          const visual = getIncidentVisual(incident.type);
          existing.haloMarker.setStyle({
            fillColor: visual.color,
            color: "#ffffff",
          });
          existing.incident = incident;
          return;
        }

        const visual = getIncidentVisual(incident.type);
        const iconMarker = L.marker([coordinates.lat, coordinates.lng], {
          icon: createIncidentIcon(incident.type),
          keyboard: false,
          riseOnHover: true,
        }).addTo(map);
        iconMarker.setZIndexOffset(1000);

        const haloMarker = L.circleMarker([coordinates.lat, coordinates.lng], {
          radius: 14,
          color: "#ffffff",
          weight: 2,
          fillColor: visual.color,
          fillOpacity: 0.38,
        }).addTo(map);

        iconMarker.on("click", () => openIncidentModal(incident));
        haloMarker.on("click", () => openIncidentModal(incident));

        markerRegistry.set(incident.id, { iconMarker, haloMarker, incident });
      }

      function ensureEdgeLayer() {
        if (edgeLayer) {
          return;
        }

        edgeLayer = document.createElement("div");
        edgeLayer.className = "map-edge-layer";
        map.getContainer().appendChild(edgeLayer);
      }

      function removeEdgeIndicator(id) {
        const indicator = edgeIndicatorRegistry.get(id);
        if (!indicator) {
          return;
        }

        indicator.remove();
        edgeIndicatorRegistry.delete(id);
      }

      function getOrCreateEdgeIndicator(id, incident) {
        if (edgeIndicatorRegistry.has(id)) {
          return edgeIndicatorRegistry.get(id);
        }

        const indicator = document.createElement("button");
        const visual = getIncidentVisual(incident.type);
        indicator.type = "button";
        indicator.className = "edge-indicator";
        indicator.innerHTML = `<i class="fa-solid ${visual.icon}"></i>`;
        indicator.style.background = visual.color;
        indicator.title = `${incident.callerName || "Caller"} - ${incident.type || "Incident"}`;
        indicator.addEventListener("click", () => {
          const state = incidentRegistry.get(id);
          if (!state) {
            return;
          }
          map.panTo([state.coordinates.lat, state.coordinates.lng], {
            animate: true,
          });
          openIncidentModal(state.incident);
        });

        edgeLayer.appendChild(indicator);
        edgeIndicatorRegistry.set(id, indicator);
        return indicator;
      }

      function updateEdgeIndicators() {
        if (!map) {
          return;
        }

        ensureEdgeLayer();

        const size = map.getSize();
        const minDistanceToEdge = 18;
        const edgePadding = 24;
        const activeIds = new Set();

        incidentRegistry.forEach(({ incident, coordinates }, id) => {
          activeIds.add(id);
          const point = map.latLngToContainerPoint([
            coordinates.lat,
            coordinates.lng,
          ]);

          const isInside =
            point.x >= minDistanceToEdge &&
            point.x <= size.x - minDistanceToEdge &&
            point.y >= minDistanceToEdge &&
            point.y <= size.y - minDistanceToEdge;

          if (isInside) {
            removeEdgeIndicator(id);
            return;
          }

          const x = Math.max(
            edgePadding,
            Math.min(size.x - edgePadding, point.x),
          );
          const y = Math.max(
            edgePadding,
            Math.min(size.y - edgePadding, point.y),
          );

          const indicator = getOrCreateEdgeIndicator(id, incident);
          const visual = getIncidentVisual(incident.type);
          indicator.innerHTML = `<i class="fa-solid ${visual.icon}"></i>`;
          indicator.style.background = visual.color;
          indicator.style.left = `${x}px`;
          indicator.style.top = `${y}px`;
        });

        Array.from(edgeIndicatorRegistry.keys()).forEach((id) => {
          if (!activeIds.has(id)) {
            removeEdgeIndicator(id);
          }
        });
      }

      function removeMissingMarkers(currentIncidents) {
        const ids = new Set(currentIncidents.map((incident) => incident.id));
        markerRegistry.forEach((markers, id) => {
          if (ids.has(id)) {
            return;
          }

          map.removeLayer(markers.iconMarker);
          map.removeLayer(markers.haloMarker);
          markerRegistry.delete(id);
          incidentRegistry.delete(id);
          removeEdgeIndicator(id);
        });
      }

      function updateDebugBadge({ activeCount, missingCount, renderedCount }) {
        if (!debugBadge) {
          return;
        }

        debugBadge.textContent = `Missing coords: ${missingCount} / ${activeCount} active | Rendered: ${renderedCount}`;
        debugBadge.classList.toggle("has-missing", missingCount > 0);
      }

      function openMarkerModal() {
        markerModal.classList.remove("hidden");
        markerModal.setAttribute("aria-hidden", "false");
      }

      function closeMarkerModal() {
        markerModal.classList.add("hidden");
        markerModal.setAttribute("aria-hidden", "true");
      }

      function renderCustomMarkerEntry(entry) {
        const lat = Number(entry?.location?.lat);
        const lng = Number(entry?.location?.lng);
        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return;
        }
        const iconClass = entry.icon || "fa-location-dot";
        const color = entry.color || "#2563eb";
        const markerHtml = `<div class="custom-map-marker" style="color:${escapeHtml(color)};"><i class="fa-solid ${escapeHtml(iconClass)}"></i></div>`;
        const marker = L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            html: markerHtml,
            iconSize: [22, 22],
            iconAnchor: [11, 11],
          }),
        });
        marker.bindPopup(
          `<strong>${escapeHtml(entry.name || "Custom Marker")}</strong><br/>${escapeHtml(entry.type || "custom")}`,
        );
        marker.addTo(map);
        customMarkerRegistry.set(entry.id, marker);
      }

      function syncCustomMarkers(entries) {
        const ids = new Set(entries.map((item) => item.id));
        customMarkerRegistry.forEach((marker, id) => {
          if (!ids.has(id)) {
            map.removeLayer(marker);
            customMarkerRegistry.delete(id);
          }
        });
        entries.forEach((entry) => {
          if (customMarkerRegistry.has(entry.id)) {
            return;
          }
          renderCustomMarkerEntry(entry);
        });
      }

      await requireAdminSession({ autoRedirect: true });

      map = L.map("map", {
        zoomControl: true,
      }).setView([14.5764, 121.0851], 17);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 20,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);
      mapReady = true;
      tryShowPage();
      setTimeout(hidePageLoader, 3500);

      map.on("move zoom resize", updateEdgeIndicators);

      closeIncidentModalBtn.addEventListener("click", closeIncidentModal);
      dismissIncidentModalBtn.addEventListener("click", closeIncidentModal);
      incidentModal
        .querySelector(".incident-modal-backdrop")
        .addEventListener("click", closeIncidentModal);
      manageIncidentBtn.addEventListener("click", () => {
        if (!selectedIncidentForManage?.id) {
          return;
        }
        stopSosLoopAlert();
        closeIncidentModal();
        transferToIncidentsPage(selectedIncidentForManage.id);
      });
      setupSosAcknowledgeHooks();
      clearNotificationsBtn.addEventListener("click", () => {
        unseenIncidents.clear();
        renderUnseenPanel();
      });
      renderUnseenPanel();
      enableSoundBtn.addEventListener("click", async () => {
        try {
          await unlockAudio();
          playNotificationAlert();
        } catch {
          alert(
            "Sound is blocked by the browser. Please interact with the page (tap/click) to enable audio.",
          );
        }
      });
      openMarkerModalBtn.addEventListener("click", openMarkerModal);
      closeMarkerModalBtn.addEventListener("click", closeMarkerModal);
      cancelMarkerBtn.addEventListener("click", closeMarkerModal);
      markerModal
        .querySelector(".incident-modal-backdrop")
        .addEventListener("click", closeMarkerModal);
      saveMarkerBtn.addEventListener("click", () => {
        const markerName = markerNameInput.value.trim() || "Custom Marker";
        const markerType = markerTypeSelect.value.trim() || "custom";
        const markerIcon = markerIconSelect.value.trim() || "fa-location-dot";
        const markerColor = markerColorInput.value || "#2563eb";
        pendingCustomMarker = {
          name: markerName,
          type: markerType,
          icon: markerIcon,
          color: markerColor,
        };
        closeMarkerModal();
        alert("Now click on the map to place the custom marker.");
      });

      subscribeActiveIncidents((incidents) => {
        handleNewIncidentAlerts(incidents);
        const activeOnly = incidents.filter(
          (incident) =>
            String(incident.status || "").toLowerCase() === "active",
        );

        let missingCount = 0;
        const activeWithCoordinates = activeOnly.filter((incident) => {
          const hasCoordinates = !!getIncidentCoordinates(incident);
          if (!hasCoordinates) {
            missingCount += 1;
          }
          return hasCoordinates;
        });

        activeWithCoordinates.forEach(addOrUpdateMarker);
        removeMissingMarkers(activeWithCoordinates);
        updateEdgeIndicators();

        if (!hasAutoFocused && activeWithCoordinates.length) {
          const bounds = L.latLngBounds(
            activeWithCoordinates.map((incident) => {
              const coords = getIncidentCoordinates(incident);
              return [coords.lat, coords.lng];
            }),
          );
          map.fitBounds(bounds, {
            padding: [70, 70],
            maxZoom: 17,
          });
          hasAutoFocused = true;
        }

        updateDebugBadge({
          activeCount: activeOnly.length,
          missingCount,
          renderedCount: markerRegistry.size,
        });
        incidentsReady = true;
        tryShowPage();
      });
      subscribeMapMarkers((markers) => {
        syncCustomMarkers(markers);
      });
      map.on("click", async (event) => {
        if (!pendingCustomMarker) {
          return;
        }
        const payload = {
          ...pendingCustomMarker,
          lat: event.latlng.lat,
          lng: event.latlng.lng,
        };
        pendingCustomMarker = null;
        try {
          await addMapMarker(payload);
        } catch (error) {
          alert(error?.message || "Unable to save custom marker.");
        }
      });
    </script>
  </body>
</html>
