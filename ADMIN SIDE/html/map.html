<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emergency Command Map</title>

    <link rel="stylesheet" href="../css/map.css" />
    <link rel="stylesheet" href="../css/page-loader.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
  </head>

  <body>
    <div id="pageLoader" class="page-loader" aria-live="polite">
      <div class="page-loader-spinner"></div>
      <div class="page-loader-text">Loading map...</div>
    </div>
    <!-- MAP -->
    <div id="map"></div>
    <div id="debugBadge" class="debug-badge">Missing coords: 0</div>
    <div id="incidentModal" class="incident-modal hidden" aria-hidden="true">
      <div class="incident-modal-backdrop"></div>
      <div class="incident-modal-card" role="dialog" aria-modal="true">
        <div class="incident-modal-header">
          <h3>Active Incident Details</h3>
          <button type="button" class="modal-close-btn" id="closeIncidentModal">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div class="incident-modal-body">
          <div class="detail-row">
            <span>Caller</span><strong id="detailCaller">-</strong>
          </div>
          <div class="detail-row">
            <span>Contact</span><strong id="detailContact">-</strong>
          </div>
          <div class="detail-row">
            <span>Incident Type</span><strong id="detailType">-</strong>
          </div>
          <div class="detail-row">
            <span>Status</span><strong id="detailStatus">-</strong>
          </div>
          <div class="detail-row">
            <span>Location</span><strong id="detailLocation">-</strong>
          </div>
          <div class="detail-row full">
            <span>Description</span><strong id="detailDescription">-</strong>
          </div>
        </div>
        <div class="incident-modal-actions">
          <button type="button" class="secondary-btn" id="dismissIncidentModal">
            Close
          </button>
          <button type="button" class="primary-btn" id="manageIncidentBtn">
            Manage in Incidents
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import {
        requireAdminSession,
        subscribeActiveIncidents,
      } from "../api/firebase_admin.js";

      let map;
      let markerRegistry = new Map();
      let incidentRegistry = new Map();
      let edgeIndicatorRegistry = new Map();
      let edgeLayer;
      const debugBadge = document.getElementById("debugBadge");
      const incidentModal = document.getElementById("incidentModal");
      const closeIncidentModalBtn =
        document.getElementById("closeIncidentModal");
      const dismissIncidentModalBtn = document.getElementById(
        "dismissIncidentModal",
      );
      const manageIncidentBtn = document.getElementById("manageIncidentBtn");
      const detailCaller = document.getElementById("detailCaller");
      const detailContact = document.getElementById("detailContact");
      const detailType = document.getElementById("detailType");
      const detailStatus = document.getElementById("detailStatus");
      const detailLocation = document.getElementById("detailLocation");
      const detailDescription = document.getElementById("detailDescription");
      const pageLoader = document.getElementById("pageLoader");
      const notifAudio = new Audio("../sounds/notif_alert.mp3");
      const sosLoopAudio = new Audio("../sounds/sos_alert.mp3");
      notifAudio.preload = "auto";
      sosLoopAudio.preload = "auto";
      sosLoopAudio.loop = true;
      let hasAutoFocused = false;
      let selectedIncidentForManage = null;
      let assetsReady = true;
      let mapReady = false;
      let incidentsReady = false;
      let loaderHidden = false;
      let hasProcessedInitialIncidentSnapshot = false;
      const knownIncidentIds = new Set();

      function hidePageLoader() {
        if (loaderHidden) {
          return;
        }
        loaderHidden = true;
        document.body.classList.add("page-ready");
        pageLoader?.classList.add("hide");
        setTimeout(() => pageLoader?.remove(), 250);
      }

      function tryShowPage() {
        if (assetsReady && mapReady && incidentsReady) {
          hidePageLoader();
        }
      }

      const markerIcon = L.divIcon({
        className: "incident-alert-marker",
        html: '<span class="pulse-ring"></span><span class="marker-core"><i class="fa-solid fa-triangle-exclamation"></i></span>',
        iconSize: [42, 42],
        iconAnchor: [21, 21],
      });

      function getIncidentCoordinates(incident) {
        const location = incident?.location || {};
        const latCandidate =
          location.lat ??
          location.latitude ??
          location._lat ??
          incident?.lat ??
          incident?.latitude;
        const lngCandidate =
          location.lng ??
          location.lon ??
          location.long ??
          location.longitude ??
          location._long ??
          incident?.lng ??
          incident?.longitude;

        const lat =
          typeof latCandidate === "number"
            ? latCandidate
            : Number(String(latCandidate || "").trim());
        const lng =
          typeof lngCandidate === "number"
            ? lngCandidate
            : Number(String(lngCandidate || "").trim());

        if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
          return null;
        }

        return { lat, lng };
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function getLocationLabel(incident, coordinates) {
        if (incident?.location?.label) {
          return incident.location.label;
        }

        if (!coordinates) {
          return "Unknown";
        }

        return `${coordinates.lat.toFixed(6)}, ${coordinates.lng.toFixed(6)}`;
      }

      function openIncidentModal(incident) {
        const coordinates = getIncidentCoordinates(incident);
        selectedIncidentForManage = incident;
        stopSosLoopAlert();

        detailCaller.textContent = incident.callerName || "Unknown Caller";
        detailContact.textContent = incident.contact || "N/A";
        detailType.textContent = incident.type || "Incident";
        detailStatus.textContent = String(
          incident.status || "active",
        ).toUpperCase();
        detailLocation.textContent = getLocationLabel(incident, coordinates);
        detailDescription.textContent =
          incident.description || "No description provided.";

        incidentModal.classList.remove("hidden");
        incidentModal.setAttribute("aria-hidden", "false");
      }

      function closeIncidentModal() {
        incidentModal.classList.add("hidden");
        incidentModal.setAttribute("aria-hidden", "true");
      }

      function playNotificationAlert() {
        notifAudio.currentTime = 0;
        notifAudio.play().catch(() => {
          // Ignore autoplay restrictions; alert will play after first user interaction.
        });
      }

      function playSosLoopAlert() {
        sosLoopAudio.currentTime = 0;
        sosLoopAudio.play().catch(() => {
          // Ignore autoplay restrictions; alert will play after first user interaction.
        });
      }

      function stopSosLoopAlert() {
        if (!sosLoopAudio.paused) {
          sosLoopAudio.pause();
          sosLoopAudio.currentTime = 0;
        }
      }

      function setupSosAcknowledgeHooks() {
        const acknowledge = () => {
          stopSosLoopAlert();
        };
        ["click", "keydown", "touchstart"].forEach((eventName) => {
          document.addEventListener(eventName, acknowledge, true);
        });
      }

      function handleNewIncidentAlerts(snapshotIncidents) {
        const snapshotIds = new Set(snapshotIncidents.map((incident) => incident.id));

        if (!hasProcessedInitialIncidentSnapshot) {
          snapshotIds.forEach((id) => knownIncidentIds.add(id));
          hasProcessedInitialIncidentSnapshot = true;
          return;
        }

        let hasNewSos = false;
        let hasNewNonSos = false;

        snapshotIncidents.forEach((incident) => {
          if (knownIncidentIds.has(incident.id)) {
            return;
          }

          const type = String(incident.type || "").toLowerCase();
          if (type === "sos") {
            hasNewSos = true;
          } else {
            hasNewNonSos = true;
          }
          knownIncidentIds.add(incident.id);
        });

        Array.from(knownIncidentIds).forEach((id) => {
          if (!snapshotIds.has(id)) {
            knownIncidentIds.delete(id);
          }
        });

        if (hasNewSos) {
          playSosLoopAlert();
        } else if (hasNewNonSos) {
          playNotificationAlert();
        }
      }

      function transferToIncidentsPage(incidentId) {
        const route = "incidents.html";
        try {
          sessionStorage.setItem("focusIncidentId", incidentId || "");
        } catch {
          // Ignore storage failures.
        }

        try {
          if (window.parent && typeof window.parent.loadPage === "function") {
            const menuItem = window.parent.document.querySelector(
              '.sidebar li[onclick*="incidents.html"]',
            );
            if (menuItem) {
              window.parent.loadPage(route, menuItem);
              return;
            }
          }
        } catch {
          // Fall back to direct frame navigation.
        }

        try {
          const frame = window.parent?.document?.getElementById("contentFrame");
          if (frame) {
            frame.src = route;
            return;
          }
        } catch {
          // Fall through to local navigation.
        }

        window.location.href = route;
      }

      function addOrUpdateMarker(incident) {
        const coordinates = getIncidentCoordinates(incident);
        if (!coordinates) {
          return;
        }

        incidentRegistry.set(incident.id, {
          incident,
          coordinates,
        });

        if (markerRegistry.has(incident.id)) {
          const existing = markerRegistry.get(incident.id);
          existing.iconMarker.setLatLng([coordinates.lat, coordinates.lng]);
          existing.iconMarker.setZIndexOffset(1000);
          existing.haloMarker.setLatLng([coordinates.lat, coordinates.lng]);
          existing.incident = incident;
          return;
        }

        const iconMarker = L.marker([coordinates.lat, coordinates.lng], {
          icon: markerIcon,
          keyboard: false,
          riseOnHover: true,
        }).addTo(map);
        iconMarker.setZIndexOffset(1000);

        const haloMarker = L.circleMarker([coordinates.lat, coordinates.lng], {
          radius: 14,
          color: "#ffffff",
          weight: 2,
          fillColor: "#ef4444",
          fillOpacity: 0.38,
        }).addTo(map);

        iconMarker.on("click", () => openIncidentModal(incident));
        haloMarker.on("click", () => openIncidentModal(incident));

        markerRegistry.set(incident.id, { iconMarker, haloMarker, incident });
      }

      function ensureEdgeLayer() {
        if (edgeLayer) {
          return;
        }

        edgeLayer = document.createElement("div");
        edgeLayer.className = "map-edge-layer";
        map.getContainer().appendChild(edgeLayer);
      }

      function removeEdgeIndicator(id) {
        const indicator = edgeIndicatorRegistry.get(id);
        if (!indicator) {
          return;
        }

        indicator.remove();
        edgeIndicatorRegistry.delete(id);
      }

      function getOrCreateEdgeIndicator(id, incident) {
        if (edgeIndicatorRegistry.has(id)) {
          return edgeIndicatorRegistry.get(id);
        }

        const indicator = document.createElement("button");
        indicator.type = "button";
        indicator.className = "edge-indicator";
        indicator.innerHTML = '<i class="fa-solid fa-location-dot"></i>';
        indicator.title = `${incident.callerName || "Caller"} - ${incident.type || "Incident"}`;
        indicator.addEventListener("click", () => {
          const state = incidentRegistry.get(id);
          if (!state) {
            return;
          }
          map.panTo([state.coordinates.lat, state.coordinates.lng], {
            animate: true,
          });
          openIncidentModal(state.incident);
        });

        edgeLayer.appendChild(indicator);
        edgeIndicatorRegistry.set(id, indicator);
        return indicator;
      }

      function updateEdgeIndicators() {
        if (!map) {
          return;
        }

        ensureEdgeLayer();

        const size = map.getSize();
        const minDistanceToEdge = 18;
        const edgePadding = 24;
        const activeIds = new Set();

        incidentRegistry.forEach(({ incident, coordinates }, id) => {
          activeIds.add(id);
          const point = map.latLngToContainerPoint([
            coordinates.lat,
            coordinates.lng,
          ]);

          const isInside =
            point.x >= minDistanceToEdge &&
            point.x <= size.x - minDistanceToEdge &&
            point.y >= minDistanceToEdge &&
            point.y <= size.y - minDistanceToEdge;

          if (isInside) {
            removeEdgeIndicator(id);
            return;
          }

          const x = Math.max(
            edgePadding,
            Math.min(size.x - edgePadding, point.x),
          );
          const y = Math.max(
            edgePadding,
            Math.min(size.y - edgePadding, point.y),
          );

          const indicator = getOrCreateEdgeIndicator(id, incident);
          indicator.style.left = `${x}px`;
          indicator.style.top = `${y}px`;
        });

        Array.from(edgeIndicatorRegistry.keys()).forEach((id) => {
          if (!activeIds.has(id)) {
            removeEdgeIndicator(id);
          }
        });
      }

      function removeMissingMarkers(currentIncidents) {
        const ids = new Set(currentIncidents.map((incident) => incident.id));
        markerRegistry.forEach((markers, id) => {
          if (ids.has(id)) {
            return;
          }

          map.removeLayer(markers.iconMarker);
          map.removeLayer(markers.haloMarker);
          markerRegistry.delete(id);
          incidentRegistry.delete(id);
          removeEdgeIndicator(id);
        });
      }

      function updateDebugBadge({ activeCount, missingCount, renderedCount }) {
        if (!debugBadge) {
          return;
        }

        debugBadge.textContent = `Missing coords: ${missingCount} / ${activeCount} active | Rendered: ${renderedCount}`;
        debugBadge.classList.toggle("has-missing", missingCount > 0);
      }

      await requireAdminSession({ autoRedirect: true });

      map = L.map("map", {
        zoomControl: true,
      }).setView([14.5764, 121.0851], 17);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 20,
        attribution: "&copy; OpenStreetMap contributors",
      }).addTo(map);
      mapReady = true;
      tryShowPage();
      setTimeout(hidePageLoader, 3500);

      map.on("move zoom resize", updateEdgeIndicators);

      closeIncidentModalBtn.addEventListener("click", closeIncidentModal);
      dismissIncidentModalBtn.addEventListener("click", closeIncidentModal);
      incidentModal
        .querySelector(".incident-modal-backdrop")
        .addEventListener("click", closeIncidentModal);
      manageIncidentBtn.addEventListener("click", () => {
        if (!selectedIncidentForManage?.id) {
          return;
        }
        stopSosLoopAlert();
        closeIncidentModal();
        transferToIncidentsPage(selectedIncidentForManage.id);
      });
      setupSosAcknowledgeHooks();

      subscribeActiveIncidents((incidents) => {
        handleNewIncidentAlerts(incidents);
        const activeOnly = incidents.filter(
          (incident) =>
            String(incident.status || "").toLowerCase() === "active",
        );

        let missingCount = 0;
        const activeWithCoordinates = activeOnly.filter((incident) => {
          const hasCoordinates = !!getIncidentCoordinates(incident);
          if (!hasCoordinates) {
            missingCount += 1;
          }
          return hasCoordinates;
        });

        activeWithCoordinates.forEach(addOrUpdateMarker);
        removeMissingMarkers(activeWithCoordinates);
        updateEdgeIndicators();

        if (!hasAutoFocused && activeWithCoordinates.length) {
          const bounds = L.latLngBounds(
            activeWithCoordinates.map((incident) => {
              const coords = getIncidentCoordinates(incident);
              return [coords.lat, coords.lng];
            }),
          );
          map.fitBounds(bounds, {
            padding: [70, 70],
            maxZoom: 17,
          });
          hasAutoFocused = true;
        }

        updateDebugBadge({
          activeCount: activeOnly.length,
          missingCount,
          renderedCount: markerRegistry.size,
        });
        incidentsReady = true;
        tryShowPage();
      });
    </script>
  </body>
</html>
