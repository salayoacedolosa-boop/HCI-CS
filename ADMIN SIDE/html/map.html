<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emergency Command Map</title>

<link rel="stylesheet" href="../css/map.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- GOOGLE MAP -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer></script>

</head>

<body>

<!-- MAP -->
<div id="map"></div>

<!-- RIGHT PANEL -->
<div class="panel">

    <div class="panel-header">
        <h3>Sending Units</h3>
        <span>#39</span>
    </div>

     <!-- CALLER -->
      <label for="name">Caller Information</label>
      <input type="text" id="name" placeholder="Caller Name">
           <!-- CONTACT -->
      <input type="text" id="contact" placeholder="Contact Number">


    <!-- UNIT -->
    <label>Which unit to send?</label>
    <div class="btn-group" id="unitGroup">
        <button class="active">Police</button>
        <button>Fire</button>
        <button>Rescue</button>
    </div>

    <!-- TYPE -->
    <label>Type of incident</label>
    <select>
        <option>Fire</option>
        <option>Medical</option>
        <option>Accident</option>
        <option>Security</option>
    </select>

    <!-- PROBLEM -->
    <label>What is the problem?</label>
    <input type="text" placeholder="Describe incident...">

    <hr>

    <!-- VICTIMS -->
    <label>How many victims?</label>
    <div class="btn-group small">
        <button>No one</button>
        <button class="active">1-4</button>
        <button>5-9</button>
        <button>Over 10</button>
    </div>

    <!-- AGGRESSORS -->
    <label>How many aggressors?</label>
    <div class="btn-group small">
        <button>Single</button>
        <button class="active">2-4</button>
        <button>5-9</button>
        <button>Over 10</button>
    </div>

    <!-- RANGE -->
    <label>Rate the danger level</label>
    <input type="range" class="range">

    <div class="panel-footer">
        <button class="send-btn">Send Units</button>
    </div>

</div>

<script>

let map;

/* MAP INIT */
function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 14.5764, lng: 121.0851 },
        zoom: 17,
        styles: [
            { elementType: "geometry", stylers: [{ color: "#0f1a13" }] },
            { featureType: "road", stylers: [{ color: "#1e293b" }] },
            { featureType: "water", stylers: [{ color: "#020617" }] }
        ]
    });
}

/* BUTTON ACTIVE */
document.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll(".btn-group button").forEach(btn => {
        btn.addEventListener("click", function () {
            const group = this.parentElement;
            group.querySelectorAll("button").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
        });
    });
});

</script>

</body>
</html>
